<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transaction History | Elite Arena Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <style>
        :root {
            --primary: #1A237E; --accent: #FFD600; --bg: #F4F7FE;
            --white: #ffffff; --text-main: #1e293b; --text-dim: #64748b;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); padding-bottom: 50px; overflow-x: hidden; }

        header { 
            padding: 20px; display: flex; align-items: center; gap: 15px; 
            background: var(--white); border-bottom: 1px solid rgba(0,0,0,0.02);
            position: sticky; top: 0; z-index: 1000;
        }
        .back-btn { font-size: 20px; color: var(--primary); cursor: pointer; transition: 0.2s; }
        header h1 { font-size: 18px; font-weight: 800; margin: 0; color: var(--primary); }

        .tab-container {
            display: flex; gap: 10px; padding: 15px 20px; overflow-x: auto;
            background: var(--white); box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .tab-container::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            background: #f1f5f9; border: none; padding: 12px 20px; border-radius: 16px;
            font-size: 11px; font-weight: 800; color: var(--text-dim); cursor: pointer;
            white-space: nowrap; text-transform: uppercase;
        }
        .tab-btn.active {
            background: var(--primary); color: var(--white);
            box-shadow: 0 6px 15px rgba(26, 35, 126, 0.2);
        }

        .history-container { padding: 20px; }
        
        .history-card {
            background: var(--white); padding: 18px 20px; border-radius: 24px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.015);
            animation: fadeInUp 0.4s ease;
        }
        
        .left-section { display: flex; align-items: center; gap: 15px; }
        .history-icon {
            width: 46px; height: 46px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 16px;
        }
        .icon-debit { background: #fee2e2; color: var(--danger); }
        .icon-credit { background: #d1fae5; color: var(--success); }
        .icon-pending { background: #fef3c7; color: var(--warning); }

        .details .service-title { font-size: 13px; font-weight: 800; color: var(--text-main); display: block; }
        .details .timestamp { font-size: 11px; font-weight: 600; color: var(--text-dim); }

        .right-section { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .amount { font-size: 14px; font-weight: 800; }
        .amount.plus { color: var(--success); }
        
        .status-badge {
            font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 8px;
            text-transform: uppercase;
        }
        .badge-pending { background: #fffbeb; color: #b45309; }
        .badge-completed { background: #ecfdf5; color: #047857; }

        .empty-state { text-align: center; padding: 80px 20px; display: none; }
        .empty-state i { font-size: 48px; color: #cbd5e1; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="location.href='Wallet.html'"><i class="fas fa-arrow-left"></i></div>
        <h1>Transaction History</h1>
    </header>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('all', this)">All</button>
        <button class="tab-btn" onclick="switchTab('purchases', this)">Purchases</button>
        <button class="tab-btn" onclick="switchTab('withdraws', this)">Withdraws</button>
        <button class="tab-btn" onclick="switchTab('swaps', this)">Swaps</button>
    </div>

    <div class="history-container" id="historyList"></div>

    <div class="empty-state" id="emptyState">
        <i class="fa-solid fa-folder-open"></i>
        <h3>No Records Found</h3>
        <p style="font-size:12px; color:#999;">Your activity in this category will appear here.</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // MATAKI NA 1: NEW FIREBASE SYNC (CM-NEXUS-SUB)
        const firebaseConfig = { databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myName = localStorage.getItem('username') || "Elite_User";

        let allTransactions = [];
        let currentTab = "all";

        function loadAllHistory() {
            allTransactions = [];
            let loadedCount = 0;
            document.getElementById('historyList').innerHTML = `<div style="text-align:center; padding:100px 0;"><i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary);"></i></div>`;

            // 1. Load general purchases (debits/credits)
            db.ref('transactions/' + myName).once('value', snap => {
                snap.forEach(child => {
                    const data = child.val();
                    allTransactions.push({ category: 'purchases', type: data.type || 'debit', service: data.service, amount: data.amount, time: data.time || Date.now(), status: 'completed' });
                });
                checkFinished(++loadedCount);
            });

            // 2. Load salary/withdraw requests
            db.ref('salary_requests/' + myName).once('value', snap => {
                const data = snap.val();
                if (data) {
                    allTransactions.push({ category: 'withdraws', type: 'debit', service: `Salary Withdraw: ${data.bank}`, amount: data.amt, time: data.time || Date.now(), status: data.status.toLowerCase() });
                }
                checkFinished(++loadedCount);
            });

            // 3. Load Airtime swaps (Using myName)
            db.ref('airtime_swaps/').orderByChild('username').equalTo(myName).once('value', snap => {
                snap.forEach(child => {
                    const data = child.val();
                    allTransactions.push({ category: 'swaps', type: 'credit', service: `Swap: ${data.network}`, amount: data.walletToCredit, time: data.time || Date.now(), status: data.status.toLowerCase() });
                });
                checkFinished(++loadedCount);
            });
        }

        function checkFinished(count) {
            if (count === 3) {
                allTransactions.sort((a, b) => b.time - a.time);
                renderHistory();
            }
        }

        function renderHistory() {
            const listElement = document.getElementById('historyList');
            const emptyElement = document.getElementById('emptyState');
            listElement.innerHTML = "";

            const filtered = allTransactions.filter(tx => (currentTab === "all" || tx.category === currentTab));

            if (filtered.length === 0) {
                emptyElement.style.display = "block";
                return;
            }
            emptyElement.style.display = "none";

            filtered.forEach(tx => {
                const date = new Date(tx.time).toLocaleDateString('en-NG', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
                const isCredit = tx.type === "credit";
                const iconClass = isCredit ? "icon-credit" : "icon-debit";
                const iconSymbol = isCredit ? '<i class="fa-solid fa-arrow-up-long"></i>' : '<i class="fa-solid fa-arrow-down-long"></i>';
                const amtClass = isCredit ? "plus" : "minus";
                const amtSign = isCredit ? "+" : "-";

                let statusBadge = "";
                if (tx.status === "pending") {
                    statusBadge = `<span class="status-badge badge-pending">Pending</span>`;
                } else if (tx.category !== "purchases") {
                    statusBadge = `<span class="status-badge badge-completed">Success</span>`;
                }

                listElement.innerHTML += `
                    <div class="history-card">
                        <div class="left-section">
                            <div class="history-icon ${tx.status === 'pending' ? 'icon-pending' : iconClass}">
                                ${tx.status === 'pending' ? '<i class="fa-solid fa-hourglass-half"></i>' : iconSymbol}
                            </div>
                            <div class="details">
                                <span class="service-title">${tx.service}</span>
                                <span class="timestamp">${date}</span>
                            </div>
                        </div>
                        <div class="right-section">
                            <span class="amount ${amtClass}">${amtSign}₦${parseFloat(tx.amount).toLocaleString()}</span>
                            ${statusBadge}
                        </div>
                    </div>`;
            });
        }

        function switchTab(tabName, element) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            renderHistory();
        }

        loadAllHistory();
    </script>
</body>
</html>
