<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buy Recharge PIN | Elite Arena Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #1A237E; --accent: #FFD600; --bg: #F4F7FE; --white: #ffffff;
            --text-main: #1e293b; --text-dim: #64748b;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); padding-bottom: 50px; }

        header { 
            padding: 20px; display: flex; align-items: center; gap: 15px; 
            background: var(--white); border-bottom: 1px solid rgba(0,0,0,0.02);
        }
        .back-btn { font-size: 20px; color: var(--primary); cursor: pointer; }
        header h1 { font-size: 18px; font-weight: 800; margin: 0; color: var(--primary); }

        .balance-badge {
            background: var(--white); margin: 20px; padding: 20px; 
            border-radius: 24px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(26, 35, 126, 0.03);
        }
        .balance-badge b { font-size: 18px; color: var(--primary); font-weight: 800; }

        .form-container { background: var(--white); margin: 0 20px; padding: 30px 24px; border-radius: 32px; box-shadow: 0 15px 35px rgba(0,0,0,0.02); }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 12px; }

        /* GYARARREN NETWORK SELECTOR TARE DA LOGO DISPLAY */
        .network-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        
        .network-btn {
            background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 20px; padding: 15px 5px;
            display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: 0.3s;
        }
        
        .logo-circle {
            width: 42px; height: 42px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 900; color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        /* LAUNUKAN LOGO */
        .mtn-bg { background: #FFCC00; color: #000; border: 2px solid #000; }
        .airtel-bg { background: #FF0000; }
        .glo-bg { background: #00FF00; color: #000; }
        .mobile-bg { background: #006600; }

        .network-btn span { font-size: 10px; font-weight: 800; color: var(--text-dim); }
        .network-btn.selected { border-color: var(--primary); background: #fff; box-shadow: 0 8px 20px rgba(26,35,126,0.1); }
        .network-btn.selected span { color: var(--primary); }

        select { width: 100%; padding: 18px; border-radius: 20px; border: 2px solid #e2e8f0; font-size: 14px; font-weight: 700; background: #f8fafc; outline: none; -webkit-appearance: none; }
        
        .btn-purchase {
            width: 100%; padding: 18px; border: none; border-radius: 22px;
            background: var(--primary); color: var(--white); font-weight: 800; font-size: 16px;
            box-shadow: 0 10px 25px rgba(26, 35, 126, 0.2); cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></div>
        <h1>Recharge Card PIN</h1>
    </header>

    <div class="balance-badge">
        <span style="font-size: 12px; font-weight: 700; color: var(--text-dim);">Available Balance</span>
        <b id="walletBal">₦0.00</b>
    </div>

    <div class="form-container animate__animated animate__fadeInUp">
        <div class="form-group">
            <label>Select Network</label>
            <div class="network-grid">
                <div class="network-btn" id="net_mtn" onclick="selectNet('MTN')">
                    <div class="logo-circle mtn-bg">MTN</div>
                    <span>MTN</span>
                </div>
                <div class="network-btn" id="net_airtel" onclick="selectNet('Airtel')">
                    <div class="logo-circle airtel-bg">AIR</div>
                    <span>Airtel</span>
                </div>
                <div class="network-btn" id="net_glo" onclick="selectNet('Glo')">
                    <div class="logo-circle glo-bg">GLO</div>
                    <span>Glo</span>
                </div>
                <div class="network-btn" id="net_9mobile" onclick="selectNet('9mobile')">
                    <div class="logo-circle mobile-bg">9M</div>
                    <span>9Mobile</span>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Amount</label>
            <select id="pinAmt" onchange="updateBtn()">
                <option value="">-- Choose Amount --</option>
                <option value="100">₦100 PIN</option>
                <option value="200">₦200 PIN</option>
                <option value="500">₦500 PIN</option>
                <option value="1000">₦1,000 PIN</option>
            </select>
        </div>

        <button class="btn-purchase" onclick="processOrder()" id="buyBtn">PROCEED</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myName = localStorage.getItem('username') || "Elite_User";
        const GSUBZ_KEY = "Ap_8fe29a8969a042bf6538b658112965fb";

        let currentBal = 0; let selectedNet = "";

        db.ref('users/' + myName + '/wallet').on('value', snap => {
            currentBal = parseFloat(snap.val()) || 0;
            document.getElementById('walletBal').innerText = "₦" + currentBal.toLocaleString();
        });

        function selectNet(name) {
            selectedNet = name;
            document.querySelectorAll('.network-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('net_' + name.toLowerCase()).classList.add('selected');
        }

        function updateBtn() {
            const amt = document.getElementById('pinAmt').value;
            document.getElementById('buyBtn').innerText = amt ? `BUY ₦${amt} PIN` : "PROCEED";
        }

        function processOrder() {
            const amt = parseFloat(document.getElementById('pinAmt').value);
            if (!selectedNet || !amt) return Swal.fire('Error', 'Please select network and amount.', 'warning');
            if (currentBal < amt) return Swal.fire('Error', 'Insufficient Balance', 'error');

            Swal.fire({
                title: 'Confirm', text: `Generate ${selectedNet} ₦${amt} PIN?`,
                showCancelButton: true, confirmButtonColor: '#1A237E'
            }).then(r => { if(r.isConfirmed) executePin(amt); });
        }

        async function executePin(amt) {
            Swal.showLoading();
            db.ref('users/' + myName).transaction(user => {
                if (user && user.wallet >= amt) { user.wallet -= amt; return user; }
            }).then(async tx => {
                if (tx.committed) {
                    let fd = new FormData();
                    fd.append('api', GSUBZ_KEY); fd.append('serviceID', selectedNet.toLowerCase());
                    fd.append('amount', amt); fd.append('requestID', "PIN-" + Date.now());

                    try {
                        const response = await fetch('https://gsubz.com/api/pay/', { method: 'POST', body: fd });
                        const d = await response.json();
                        if (d.code == 200) {
                            db.ref('transactions/' + myName).push({ type: 'debit', service: `Recharge PIN: ${selectedNet}`, amount: amt, time: Date.now() });
                            Swal.fire({ icon: 'success', title: 'Successful!', html: `<div style="background:#f1f5f9; padding:20px; border-radius:15px; font-weight:800; font-size:20px;">${d.pin || '1234-5678-9012'}</div>` });
                        } else {
                            db.ref('users/' + myName + '/wallet').transaction(w => (w || 0) + amt);
                            Swal.fire('Failed', d.description, 'error');
                        }
                    } catch (e) {
                        db.ref('users/' + myName + '/wallet').transaction(w => (w || 0) + amt);
                        Swal.fire('Error', 'Connection timeout.', 'error');
                    }
                }
            });
        }
    </script>
</body>
</html>
