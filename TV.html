<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cable TV Subscription | Elite Arena Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #0062ff; 
            --accent: #00f2fe; 
            --bg: #0b0f19; /* Duhun gaba daya dandalin */
            --surface: #111827; 
            --border: #1f2937; 
            --white: #111827;
            --text-main: #f9fafb; 
            --text-dim: #9ca3af; 
            --glow: rgba(0, 98, 255, 0.15);
            --success: #10b981;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); padding-bottom: 50px; overflow-x: hidden; }

        header { 
            padding: 20px; display: flex; align-items: center; gap: 15px; 
            background: var(--surface); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .back-btn { font-size: 20px; color: var(--text-main); cursor: pointer; transition: 0.2s; }
        .back-btn:active { transform: scale(0.85); }
        header h1 { font-size: 18px; font-weight: 800; margin: 0; color: var(--text-main); letter-spacing: -0.5px; }

        .balance-badge {
            background: var(--surface); margin: 20px; padding: 18px 24px; 
            border-radius: 24px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); border: 1px solid var(--border);
        }
        .balance-badge span { font-size: 11px; color: var(--text-dim); font-weight: 800; text-transform: uppercase; }
        .balance-badge b { font-size: 17px; color: var(--primary); font-weight: 800; }

        .form-container { 
            background: var(--surface); margin: 0 20px; padding: 30px 24px; 
            border-radius: 32px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border: 1px solid var(--border);
        }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }

        .network-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .network-btn {
            background: var(--bg); border: 2px solid var(--border); border-radius: 20px; padding: 14px 8px;
            display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: 0.3s;
        }
        .network-logo {
            width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800; color: white; box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
        .logo-dstv { background: linear-gradient(135deg, #0288D1 0%, #01579B 100%); }
        .logo-gotv { background: linear-gradient(135deg, #E65100 0%, #BF360C 100%); }
        .logo-startimes { background: linear-gradient(135deg, #388E3C 0%, #1B5E20 100%); }

        .network-btn span { font-size: 11px; font-weight: 700; color: var(--text-dim); }
        .network-btn.selected { border-color: var(--primary); background: var(--surface); box-shadow: 0 8px 20px var(--glow); }
        .network-btn.selected span { color: var(--primary); }

        .btn-verify {
            padding: 16px 22px; border: none; border-radius: 20px;
            background: rgba(0, 98, 255, 0.1); color: var(--primary); font-weight: 800; font-size: 13px; cursor: pointer; transition: 0.3s;
        }
        .btn-verify:active { transform: scale(0.95); }

        .customer-card {
            background: rgba(16, 185, 129, 0.1); border: 1px dashed rgba(16, 185, 129, 0.3); color: var(--success);
            padding: 15px 20px; border-radius: 20px; font-weight: 700; font-size: 13px;
            margin-bottom: 20px; display: none; align-items: center; gap: 10px;
        }

        select, input { width: 100%; padding: 16px 20px; border-radius: 20px; border: 2px solid var(--border); font-size: 14px; font-weight: 700; color: var(--text-main); background: var(--bg); outline: none; -webkit-appearance: none; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--primary); }
        
        .btn-purchase {
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            background: var(--primary); color: white; font-weight: 800; font-size: 15px;
            box-shadow: 0 10px 25px rgba(0, 98, 255, 0.25); cursor: pointer; transition: 0.3s;
        }
        .btn-purchase:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="location.href='Wallet.html'"><i class="fas fa-arrow-left"></i></div>
        <h1>Cable TV Subscription</h1>
    </header>

    <div class="balance-badge">
        <span>Available Balance</span>
        <b id="walletBal">₦0.00</b>
    </div>

    <div class="form-container animate__animated animate__fadeInUp">
        <div class="form-group">
            <label>Select Provider</label>
            <div class="network-grid">
                <div class="network-btn" id="net_dstv" onclick="selectProvider('DSTV')">
                    <div class="network-logo logo-dstv"><i class="fas fa-satellite-dish"></i></div>
                    <span>DSTV</span>
                </div>
                <div class="network-btn" id="net_gotv" onclick="selectProvider('GOTV')">
                    <div class="network-logo logo-gotv"><i class="fas fa-tv"></i></div>
                    <span>GOTV</span>
                </div>
                <div class="network-btn" id="net_startimes" onclick="selectProvider('StarTimes')">
                    <div class="network-logo logo-startimes"><i class="fas fa-broadcast-tower"></i></div>
                    <span>StarTimes</span>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>IUC / SmartCard Number</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="iucNo" placeholder="Enter SmartCard number" oninput="resetVerify()">
                <button class="btn-verify" onclick="validateIuc()">VERIFY</button>
            </div>
        </div>

        <div class="customer-card" id="customerCard">
            <i class="fas fa-user-check"></i><span id="customerName">...</span>
        </div>

        <div class="form-group">
            <label>Select Package</label>
            <select id="tvPlan" onchange="updatePrice()">
                <option value="">-- Verify SmartCard First --</option>
            </select>
        </div>

        <button class="btn-purchase" onclick="processTvOrder()" id="buyBtn">PROCEED</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CIKAKKEN LIVE CONFIG NA FIREBASE DLNKA NA GASKE
        const firebaseConfig = {
            apiKey: "AIzaSyDm6DoHt0g0_B1E8FTxv8jRkbauTVu95Q0",
            authDomain: "cm-nexus-sub.firebaseapp.com",
            projectId: "cm-nexus-sub",
            databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com",
            storageBucket: "cm-nexus-sub.firebasestorage.app",
            messagingSenderId: "22010501991",
            appId: "1:22010501991:web:8f84589f0d89ab7496edc2"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myName = localStorage.getItem('username');

        // Tsaro: Idan babu login, korar user baya
        if(!myName) {
            window.location.href = "index.html";
        }

        const GSUBZ_KEY = "Ap_8fe29a8969a042bf6538b658112965fb";
        const MY_MARGIN = 100; 

        let currentBal = 0; let selectedProvider = ""; let verified = false;

        // SYNC BALANCE LIVE
        db.ref('users/' + myName + '/wallet').on('value', snap => {
            currentBal = parseFloat(snap.val()) || 0;
            document.getElementById('walletBal').innerText = "₦" + currentBal.toLocaleString('en-US', { minimumFractionDigits: 2 });
        });

        function selectProvider(name) {
            selectedProvider = name; verified = false;
            document.querySelectorAll('.network-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('net_' + name.toLowerCase()).classList.add('selected');
            document.getElementById('customerCard').style.display = 'none';
            document.getElementById('tvPlan').innerHTML = '<option value="">-- Verify SmartCard First --</option>';
        }

        function resetVerify() { verified = false; document.getElementById('customerCard').style.display = 'none'; document.getElementById('tvPlan').innerHTML = '<option value="">-- Verify SmartCard First --</option>'; }

        // IUC VALIDATION TARE DA CODEDABS PROXY
        async function validateIuc() {
            const iuc = document.getElementById('iucNo').value.trim();
            if (!selectedProvider) return Swal.fire('Required', 'Please select a provider first.', 'warning');
            if (iuc.length < 5) return Swal.fire('Required', 'Please enter a valid SmartCard/IUC number.', 'warning');

            Swal.fire({ title: 'Verifying SmartCard...', html: 'Connecting to GSubz Gateway...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const vUrl = `https://gsubz.com/api/customer-validation/?api=${GSUBZ_KEY}&serviceID=${selectedProvider.toLowerCase()}&number=${iuc}`;
            const proxy = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(vUrl)}`;

            try {
                const res = await fetch(proxy);
                const d = await res.json();

                if (d.code == 200 || d.status === "success") {
                    document.getElementById('customerName').innerText = "Name: " + (d.name || d.customer_name || "Verified Customer");
                    document.getElementById('customerCard').style.display = 'flex';
                    verified = true; 
                    fetchPackages(); 
                    Swal.close();
                } else {
                    Swal.fire('Error', d.description || 'Invalid IUC Number. Double check and try again.', 'error');
                }
            } catch (e) { 
                Swal.fire('Fetch Error', 'Validation gateway timed out. Please try again.', 'warning'); 
                console.error(e);
            }
        }

        // FETCH PLANS TARE DA CODEDABS PROXY
        async function fetchPackages() {
            const planSelect = document.getElementById('tvPlan');
            planSelect.innerHTML = '<option value="">-- Loading Packages... --</option>';
            
            const pUrl = `https://api.gsubz.com/api/plans?service=${selectedProvider.toLowerCase()}`;
            const proxy = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(pUrl)}`;

            try {
                const res = await fetch(proxy);
                const data = await res.json();
                
                if (data && data.plans) {
                    let opts = '<option value="">-- Choose Package --</option>';
                    data.plans.forEach(p => {
                        let finalPrice = parseFloat(p.price) + MY_MARGIN;
                        opts += `<option value="${p.value}" data-price="${finalPrice}">${p.displayName} (₦${finalPrice.toLocaleString('en-US', { minimumFractionDigits: 2 })})</option>`;
                    });
                    planSelect.innerHTML = opts;
                } else {
                    throw new Error("No plans returned");
                }
            } catch (e) { 
                planSelect.innerHTML = '<option value="">-- Error Loading Plans --</option>'; 
                console.error(e);
            }
        }

        function updatePrice() {
            const sel = document.getElementById('tvPlan');
            const price = sel.options[sel.selectedIndex].getAttribute('data-price');
            document.getElementById('buyBtn').innerText = price ? `PAY ₦${parseFloat(price).toLocaleString('en-US', { minimumFractionDigits: 2 })}` : "PROCEED";
        }

        function processTvOrder() {
            const sel = document.getElementById('tvPlan');
            const plan = sel.value;
            const meter = document.getElementById('iucNo').value.trim();

            if (!verified) return Swal.fire('Required', 'Please click VERIFY to validate your SmartCard/IUC number first.', 'warning');
            if (!plan) return Swal.fire('Required', 'Please select a cable package.', 'warning');
            
            const price = parseFloat(sel.options[sel.selectedIndex].getAttribute('data-price'));
            if (currentBal < price) return Swal.fire('Error', 'Insufficient wallet balance. Please fund your account.', 'error');

            Swal.fire({
                title: 'Confirm Subscription', 
                html: `Are you sure you want to subscribe <b>${selectedProvider}</b> for SmartCard number <b>${meter}</b>?<br><br>Total Charge: <b>₦${price.toLocaleString('en-US', { minimumFractionDigits: 2 })}</b>`,
                showCancelButton: true, 
                confirmButtonColor: '#0062ff',
                cancelButtonColor: '#1f2937'
            }).then(r => { if(r.isConfirmed) executeSub(plan, price); });
        }

        async function executeSub(plan, price) {
            const iuc = document.getElementById('iucNo').value.trim();
            Swal.fire({ title: 'Processing Transaction...', html: 'Charging wallet balance...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            // 1. DEBIT THE USER WALLET FIRST
            db.ref('users/' + myName).transaction(user => {
                if (user && user.wallet >= price) { 
                    user.wallet -= price; 
                    return user; 
                }
            }).then(async tx => {
                if (tx.committed) {
                    Swal.fire({ title: 'Activating Package...', html: 'Subscribing decoder with GSubz API...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                    let fd = new FormData();
                    fd.append('api', GSUBZ_KEY); 
                    fd.append('serviceID', selectedProvider.toLowerCase());
                    fd.append('plan', plan); 
                    fd.append('number', iuc);
                    fd.append('requestID', "TV-" + Date.now());

                    try {
                        const res = await fetch('https://gsubz.com/api/pay/', { method: 'POST', body: fd });
                        const d = await res.json();
                        
                        if (d.code == 200 || d.status === "TRANSACTION_SUCCESSFUL") {
                            // 2. WRITE DEBIT TRANSACTION TO HISTORY
                            db.ref('transactions/' + myName).push({ 
                                type: 'debit', 
                                service: `TV Sub: ${selectedProvider} (${iuc})`, 
                                amount: price, 
                                time: Date.now() 
                            }).then(() => {
                                Swal.fire('Success!', `Your ${selectedProvider} subscription has been successfully activated on SmartCard number ${iuc}!`, 'success');
                                resetVerify();
                                document.getElementById('iucNo').value = "";
                                document.getElementById('buyBtn').innerText = "PROCEED";
                            });
                        } else {
                            // Idan GSubz ya dawo da kuskure, mayar wa user da kudin wallet dinsa (Refund)
                            db.ref('users/' + myName + '/wallet').transaction(w => (w || 0) + price);
                            Swal.fire('Failed', d.description || 'Provider rejected subscription request. Wallet refunded.', 'error');
                        }
                    } catch (e) {
                        // Idan network ya katse, mayar wa user da kudin wallet dinsa (Refund)
                        db.ref('users/' + myName + '/wallet').transaction(w => (w || 0) + price);
                        Swal.fire('Network Timeout', 'API did not respond in time. Wallet has been safely auto-refunded.', 'error');
                        console.error(e);
                    }
                } else {
                    Swal.fire('Error', 'Transaction rejected. Insufficient balance.', 'error');
                }
            });
        }
    </script>
</body>
</html>
