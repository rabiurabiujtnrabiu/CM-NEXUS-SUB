<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cable TV Subscription | Elite Arena Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* ASALIN STYLE DIN KA - BAN TABA KO DIGO DAYA BA */
        :root {
            --primary: #1A237E; --accent: #FFD600; --bg: #F4F7FE; --white: #ffffff;
            --text-main: #1e293b; --text-dim: #64748b; --border: #e2e8f0; --glow: rgba(26, 35, 126, 0.15);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); padding-bottom: 50px; overflow-x: hidden; }

        header { 
            padding: 20px; display: flex; align-items: center; gap: 15px; 
            background: var(--white); border-bottom: 1px solid rgba(0,0,0,0.02);
            position: sticky; top: 0; z-index: 1000;
        }
        .back-btn { font-size: 20px; color: var(--primary); cursor: pointer; transition: 0.2s; }
        header h1 { font-size: 18px; font-weight: 800; margin: 0; color: var(--primary); letter-spacing: -0.5px; }

        .balance-badge {
            background: var(--white); margin: 20px; padding: 18px 24px; 
            border-radius: 24px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(26, 35, 126, 0.03); border: 1px solid rgba(26, 35, 126, 0.04);
        }
        .balance-badge b { font-size: 17px; color: var(--primary); font-weight: 800; }

        .form-container { 
            background: var(--white); margin: 0 20px; padding: 30px 24px; 
            border-radius: 32px; box-shadow: 0 15px 35px rgba(0,0,0,0.02); 
        }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 12px; }

        .network-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .network-btn {
            background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 20px; padding: 14px 8px;
            display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer;
        }
        .network-logo {
            width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800; color: white; box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
        .logo-dstv { background: linear-gradient(135deg, #0288D1 0%, #01579B 100%); }
        .logo-gotv { background: linear-gradient(135deg, #E65100 0%, #BF360C 100%); }
        .logo-startimes { background: linear-gradient(135deg, #388E3C 0%, #1B5E20 100%); }

        .network-btn.selected { border-color: var(--primary); box-shadow: 0 8px 20px var(--glow); }

        .btn-verify {
            padding: 16px 22px; border: none; border-radius: 20px;
            background: #e0f2fe; color: #0369a1; font-weight: 800; font-size: 13px; cursor: pointer;
        }
        .customer-card {
            background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d;
            padding: 15px 20px; border-radius: 20px; font-weight: 700; font-size: 13px;
            margin-bottom: 20px; display: none; align-items: center; gap: 10px;
        }

        select, input { width: 100%; padding: 16px 20px; border-radius: 20px; border: 2px solid #e2e8f0; font-size: 14px; font-weight: 700; background: #f8fafc; outline: none; -webkit-appearance: none; }
        
        .btn-purchase {
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            background: var(--primary); color: var(--white); font-weight: 800; font-size: 15px;
            box-shadow: 0 10px 25px rgba(26, 35, 126, 0.25); cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="location.href='Wallet.html'"><i class="fas fa-arrow-left"></i></div>
        <h1>Cable TV Subscription</h1>
    </header>

    <div class="balance-badge">
        <span>Available Balance</span>
        <b id="walletBal">₦0.00</b>
    </div>

    <div class="form-container animate__animated animate__fadeInUp">
        <div class="form-group">
            <label>Select Provider</label>
            <div class="network-grid">
                <div class="network-btn" id="net_dstv" onclick="selectProvider('DSTV')">
                    <div class="network-logo logo-dstv"><i class="fas fa-satellite-dish"></i></div>
                    <span>DSTV</span>
                </div>
                <div class="network-btn" id="net_gotv" onclick="selectProvider('GOTV')">
                    <div class="network-logo logo-gotv"><i class="fas fa-tv"></i></div>
                    <span>GOTV</span>
                </div>
                <div class="network-btn" id="net_startimes" onclick="selectProvider('StarTimes')">
                    <div class="network-logo logo-startimes"><i class="fas fa-broadcast-tower"></i></div>
                    <span>StarTimes</span>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>IUC / SmartCard Number</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="iucNo" placeholder="Enter SmartCard number">
                <button class="btn-verify" onclick="validateIuc()">VERIFY</button>
            </div>
        </div>

        <div class="customer-card" id="customerCard">
            <i class="fas fa-user-check"></i><span id="customerName">...</span>
        </div>

        <div class="form-group">
            <label>Select Package</label>
            <select id="tvPlan" onchange="updatePrice()">
                <option value="">-- Verify SmartCard First --</option>
            </select>
        </div>

        <button class="btn-purchase" onclick="processTvOrder()" id="buyBtn">PROCEED</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // NEW FIREBASE SYNC - CM-NEXUS-SUB
        const firebaseConfig = { databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myName = localStorage.getItem('username') || "Elite_User";

        // GSUBZ LIVE SETTINGS
        const GSUBZ_KEY = "Ap_8fe29a8969a042bf6538b658112965fb";
        const MY_MARGIN = 100; 

        let currentBal = 0; let selectedProvider = ""; let verified = false;

        db.ref('users/' + myName + '/wallet').on('value', snap => {
            currentBal = parseFloat(snap.val()) || 0;
            document.getElementById('walletBal').innerText = "₦" + currentBal.toLocaleString();
        });

        function selectProvider(name) {
            selectedProvider = name; verified = false;
            document.querySelectorAll('.network-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('net_' + name.toLowerCase()).classList.add('selected');
            document.getElementById('customerCard').style.display = 'none';
            document.getElementById('tvPlan').innerHTML = '<option value="">-- Verify SmartCard First --</option>';
        }

        async function validateIuc() {
            const iuc = document.getElementById('iucNo').value.trim();
            if (!selectedProvider || iuc.length < 5) return Swal.fire('Error', 'Select provider and enter IUC number.', 'warning');

            Swal.fire({ title: 'Verifying Card...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const vUrl = `https://gsubz.com/api/customer-validation/?api=${GSUBZ_KEY}&serviceID=${selectedProvider.toLowerCase()}&number=${iuc}`;
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(vUrl)}`;

            try {
                const res = await fetch(proxy);
                const json = await res.json();
                const d = JSON.parse(json.contents);

                if (d.code == 200 || d.status === "success") {
                    document.getElementById('customerName').innerText = "Name: " + (d.name || d.customer_name);
                    document.getElementById('customerCard').style.display = 'flex';
                    verified = true; 
                    fetchPackages(); 
                    Swal.close();
                } else {
                    Swal.fire('Error', d.description || 'Invalid IUC Number', 'error');
                }
            } catch (e) { Swal.fire('Error', 'Connection timeout.', 'error'); }
        }

        async function fetchPackages() {
            const planSelect = document.getElementById('tvPlan');
            planSelect.innerHTML = '<option value="">-- Loading Packages... --</option>';
            
            const pUrl = `https://api.gsubz.com/api/plans?service=${selectedProvider.toLowerCase()}`;
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(pUrl)}`;

            try {
                const res = await fetch(proxy);
                const json = await res.json();
                const data = JSON.parse(json.contents);
                let opts = '<option value="">-- Choose Package --</option>';
                data.plans.forEach(p => {
                    let finalPrice = parseFloat(p.price) + MY_MARGIN;
                    opts += `<option value="${p.value}" data-price="${finalPrice}">${p.displayName} (₦${finalPrice.toLocaleString()})</option>`;
                });
                planSelect.innerHTML = opts;
            } catch (e) { planSelect.innerHTML = '<option value="">-- Error Loading Plans --</option>'; }
        }

        function updatePrice() {
            const sel = document.getElementById('tvPlan');
            const price = sel.options[sel.selectedIndex].getAttribute('data-price');
            document.getElementById('buyBtn').innerText = price ? `PAY ₦${parseFloat(price).toLocaleString()}` : "PROCEED";
        }

        function processTvOrder() {
            const sel = document.getElementById('tvPlan');
            const plan = sel.value;
            const price = parseFloat(sel.options[sel.selectedIndex].getAttribute('data-price'));
            if (!verified || !plan) return Swal.fire('Error', 'Verify IUC and select package.', 'warning');
            if (currentBal < price) return Swal.fire('Error', 'Insufficient Balance.', 'error');

            Swal.fire({
                title: 'Confirm', text: `Subscribe ${selectedProvider} (${document.getElementById('iucNo').value}) for ₦${price.toLocaleString()}?`,
                showCancelButton: true, confirmButtonColor: '#1A237E'
            }).then(r => { if(r.isConfirmed) executeSub(plan, price); });
        }

        async function executeSub(plan, price) {
            const iuc = document.getElementById('iucNo').value;
            Swal.showLoading();
            db.ref('users/' + myName).transaction(user => {
                if (user && user.wallet >= price) { user.wallet -= price; return user; }
            }).then(async tx => {
                if (tx.committed) {
                    let fd = new FormData();
                    fd.append('api', GSUBZ_KEY); fd.append('serviceID', selectedProvider.toLowerCase());
                    fd.append('plan', plan); fd.append('number', iuc);
                    fd.append('requestID', "TV-" + Date.now());

                    try {
                        const res = await fetch('https://gsubz.com/api/pay/', { method: 'POST', body: fd });
                        const d = await res.json();
                        if (d.code == 200) {
                            db.ref('transactions/' + myName).push({ type: 'debit', service: `TV Sub: ${selectedProvider}`, amount: price, time: Date.now() });
                            Swal.fire('Success!', 'Subscription activated successfully.', 'success');
                        } else {
                            db.ref('users/' + myName + '/wallet').transaction(w => (w || 0) + price);
                            Swal.fire('Failed', d.description, 'error');
                        }
                    } catch (e) {
                        db.ref('users/' + myName + '/wallet').transaction(w => (w || 0) + price);
                        Swal.fire('Error', 'Timeout. Refunded.', 'error');
                    }
                }
            });
        }
    </script>
</body>
</html>
