<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Purchase Data | CM Nexus Sub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #0062ff;
            --accent: #00f2fe;
            --bg: #0b0f19;
            --surface: #111827;
            --border: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); padding-bottom: 50px; }

        header { 
            padding: 20px; display: flex; align-items: center; gap: 15px; 
            background: var(--surface); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        header h1 { font-size: 18px; font-weight: 800; margin: 0; color: var(--text-main); }

        .balance-badge { background: var(--surface); margin: 15px; padding: 15px 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .balance-badge b { font-size: 16px; color: var(--primary); font-weight: 800; }

        .form-container { background: var(--surface); margin: 0 15px; padding: 25px 20px; border-radius: 30px; border: 1px solid var(--border); }
        .label { display: block; font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; }

        .network-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .network-btn { background: var(--bg); border: 2px solid var(--border); border-radius: 15px; padding: 12px 5px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: 0.3s; }
        .network-btn.selected { border-color: var(--primary); background: var(--surface); box-shadow: 0 5px 15px rgba(0, 98, 255, 0.15); }
        .logo-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 9px; font-weight: 800; }

        .service-tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tab-btn { white-space: nowrap; padding: 10px 15px; border-radius: 10px; background: var(--border); border: none; font-size: 10px; font-weight: 800; color: var(--text-main); cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(0, 98, 255, 0.2); }

        .input-box { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid var(--border); background: var(--bg); font-weight: 700; color: var(--text-main); outline: none; margin-bottom: 15px; font-size: 14px; transition: 0.3s; }
        .input-box:focus { border-color: var(--primary); }
        
        .btn-purchase { width: 100%; padding: 16px; border-radius: 15px; border: none; background: var(--primary); color: white; font-weight: 800; font-size: 14px; cursor: pointer; box-shadow: 0 8px 20px rgba(0, 98, 255, 0.2); transition: 0.3s; }
        .btn-purchase:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-arrow-left" style="color:var(--text-main); cursor:pointer" onclick="history.back()"></i>
        <h1 style="margin-left:15px">Elite Arena Pro</h1>
    </header>

    <div class="balance-badge">
        <span style="font-size: 10px; font-weight: 800; color: var(--text-muted);">LIVE BALANCE</span>
        <b id="walletBal">₦0.00</b>
    </div>

    <div class="form-container">
        <div id="mainForm">
            <span class="label">Step 1: Select Network</span>
            <div class="network-grid">
                <div class="network-btn" id="net_mtn" onclick="changeNet('mtn')"><div style="background:#FFD600; color:#000;" class="logo-circle">MTN</div><span style="font-size:9px; font-weight:700; color:var(--text-main)">MTN</span></div>
                <div class="network-btn" id="net_airtel" onclick="changeNet('airtel')"><div style="background:#FF1744; color:#fff;" class="logo-circle">AIR</div><span style="font-size:9px; font-weight:700; color:var(--text-main)">Airtel</span></div>
                <div class="network-btn" id="net_glo" onclick="changeNet('glo')"><div style="background:#00E676; color:#fff;" class="logo-circle">GLO</div><span style="font-size:9px; font-weight:700; color:var(--text-main)">Glo</span></div>
                <div class="network-btn" id="net_9mobile" onclick="changeNet('9mobile')"><div style="background:#004D40; color:#fff;" class="logo-circle">9M</div><span style="font-size:9px; font-weight:700; color:var(--text-main)">9mobile</span></div>
            </div>

            <div id="serviceTabArea" style="display:none;">
                <span class="label">Step 2: Service Category</span>
                <div class="service-tabs" id="tabList"></div>
            </div>

            <div id="inputSection" style="margin-top: 15px;">
                <span class="label">Recipient Number</span>
                <input type="number" class="input-box" id="phoneNo" placeholder="e.g. 08144216361">

                <span class="label">Select Plan</span>
                <select class="input-box" id="planSelect" onchange="updateBtnLabel()">
                    <option value="">-- Select Category First --</option>
                </select>

                <button class="btn-purchase" onclick="processOrder()" id="buyBtn">PROCEED</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Realtime Database Config
        const config = {
            apiKey: "AIzaSyDm6DoHt0g0_B1E8FTxv8jRkbauTVu95Q0",
            authDomain: "cm-nexus-sub.firebaseapp.com",
            projectId: "cm-nexus-sub",
            databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com",
            storageBucket: "cm-nexus-sub.firebasestorage.app",
            messagingSenderId: "22010501991",
            appId: "1:22010501991:web:8f84589f0d89ab7496edc2"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database();
        const username = localStorage.getItem('username') || "test_user"; 
        
        let walletBal = 0; 
        let currentNetwork = "";
        let currentCategory = "";

        // Synchronize wallet balance from Firebase Realtime Database
        db.ref('users/' + username + '/wallet').on('value', s => {
            walletBal = parseFloat(s.val()) || 0;
            document.getElementById('walletBal').innerText = "₦" + walletBal.toLocaleString('en-US', { minimumFractionDigits: 2 });
        });

        // App local price repository architecture
        const appPrices = {
            "mtn": {
                "SME": {
                    "179": { "name": "500MB SME", "price": 350 },
                    "166": { "name": "1GB SME", "price": 500 },
                    "167": { "name": "2GB SME", "price": 1000 },
                    "168": { "name": "3GB SME", "price": 1500 },
                    "357": { "name": "5GB SME", "price": 2500 }
                },
                "GIFTING": {
                    "373": { "name": "75MB Gifting", "price": 80 },
                    "374": { "name": "110MB Gifting", "price": 100 },
                    "365": { "name": "200MB Gifting", "price": 120 },
                    "166": { "name": "1GB Gifting", "price": 500 },
                    "355": { "name": "1.5GB Gifting", "price": 600 },
                    "167": { "name": "2GB Lite Gifting", "price": 800 },
                    "366": { "name": "2GB Std Gifting", "price": 1500 },
                    "370": { "name": "10GB Gifting", "price": 4500 },
                    "371": { "name": "20GB Gifting", "price": 7500 }
                },
                "COOPERATE GIFTING": {
                    "179": { "name": "500MB Corporate Gifting", "price": 355 },
                    "166": { "name": "1GB Corporate Gifting", "price": 550 },
                    "1100": { "name": "2GB Corporate Gifting", "price": 1100 }, // Unique fallback id handling
                    "168": { "name": "3GB Corporate Gifting", "price": 1800 },
                    "2999": { "name": "5GB Pro Corporate Gifting", "price": 2999 },
                    "1499": { "name": "5GB Lite Corporate Gifting", "price": 1499 }
                }
            },
            "airtel": {
                "GIFTING": {
                    "476": { "name": "150MB Gifting", "price": 60 },
                    "300": { "name": "300MB Gifting", "price": 115 },
                    "478": { "name": "600MB Gifting", "price": 230 },
                    "481": { "name": "1GB Gifting", "price": 355 },
                    "484": { "name": "1.5GB Gifting", "price": 440 },
                    "485": { "name": "2GB Gifting", "price": 600 },
                    "3000": { "name": "3GB Gifting", "price": 800 },
                    "3200": { "name": "3.2GB Gifting", "price": 600 },
                    "482": { "name": "6.5GB Gifting", "price": 1050 },
                    "483": { "name": "10GB Gifting", "price": 3000 },
                    "1300": { "name": "13GB Gifting", "price": 5000 }
                }
            },
            "9mobile": {
                "DATA": {
                    "182": { "name": "500MB Data", "price": 300 },
                    "298": { "name": "1GB Data", "price": 549 },
                    "300": { "name": "1.5GB Data", "price": 798 },
                    "299": { "name": "2GB Data", "price": 1048 },
                    "303": { "name": "3GB Data", "price": 1548 },
                    "347": { "name": "4GB Data", "price": 2047 },
                    "348": { "name": "4.5GB Data", "price": 2297 },
                    "304": { "name": "5GB Data", "price": 2546 },
                    "305": { "name": "10GB Data", "price": 5042 },
                    "362": { "name": "11GB Data", "price": 5541 },
                    "351": { "name": "20GB Data", "price": 10034 }
                }
            },
            "glo": {
                "COOPERATE GIFTING": {
                    "200": { "name": "200MB Corporate Gifting", "price": 200 },
                    "500": { "name": "500MB Corporate Gifting", "price": 280 },
                    "1003": { "name": "1GB 3Days Corporate Gifting", "price": 340 },
                    "1007": { "name": "1GB 7Days Corporate Gifting", "price": 360 },
                    "1000": { "name": "1GB 30Days Corporate Gifting", "price": 479 },
                    "2000": { "name": "2GB Corporate Gifting", "price": 860 },
                    "3003": { "name": "3GB 3Days Corporate Gifting", "price": 878 },
                    "3007": { "name": "3GB 7Days Corporate Gifting", "price": 920 },
                    "3000": { "name": "3GB 30Days Corporate Gifting", "price": 1277 },
                    "5003": { "name": "5GB 3Days Corporate Gifting", "price": 1380 },
                    "5007": { "name": "5GB 7Days Corporate Gifting", "price": 1480 },
                    "5000": { "name": "5GB 30Days Corporate Gifting", "price": 2075 },
                    "10000": { "name": "10GB Corporate Gifting", "price": 4070 }
                },
                "SME": {
                    "491": { "name": "750MB SME", "price": 239 },
                    "492": { "name": "1.5GB SME", "price": 334 },
                    "493": { "name": "2.5GB SME", "price": 523 },
                    "494": { "name": "10GB SME", "price": 1940 }
                }
            }
        };

        function changeNet(netId) {
            currentNetwork = netId;
            document.querySelectorAll('.network-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('net_' + netId).classList.add('selected');
            
            let tabs = "";
            let categories = Object.keys(appPrices[netId]);
            categories.forEach((cat, index) => {
                tabs += `<button class="tab-btn" id="t_${index}" onclick="displayCategories('${cat}', 't_${index}')">${cat}</button>`;
            });
            
            document.getElementById('tabList').innerHTML = tabs;
            document.getElementById('serviceTabArea').style.display = "block";
            document.getElementById('planSelect').innerHTML = `<option value="">-- Select Category First --</option>`;
            document.getElementById('buyBtn').innerText = "PROCEED";
        }

        function displayCategories(category, tabElementId) {
            currentCategory = category;
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(tabElementId).classList.add('active');
            
            let options = `<option value="">-- Select Data Plan --</option>`;
            let plans = appPrices[currentNetwork][category];
            
            for (let id in plans) {
                options += `<option value="${id}" data-price="${plans[id].price}" data-name="${plans[id].name}">${plans[id].name} (₦${plans[id].price})</option>`;
            }
            document.getElementById('planSelect').innerHTML = options;
        }

        function updateBtnLabel() {
            const selectElement = document.getElementById('planSelect');
            if(selectElement.selectedIndex <= 0) {
                document.getElementById('buyBtn').innerText = "PROCEED";
                return;
            }
            const price = selectElement.options[selectElement.selectedIndex].getAttribute('data-price');
            document.getElementById('buyBtn').innerText = `PAY ₦${price} NOW`;
        }

        function processOrder() {
            const selectElement = document.getElementById('planSelect');
            const planId = selectElement.value;
            
            if(!planId) return Swal.fire('Required', 'Please select a data plan first.', 'warning');
            
            const price = parseFloat(selectElement.options[selectElement.selectedIndex].getAttribute('data-price'));
            const planName = selectElement.options[selectElement.selectedIndex].getAttribute('data-name');
            const phone = document.getElementById('phoneNo').value.trim();

            if(phone.length < 10) return Swal.fire('Incomplete', 'Please enter a valid recipient phone number.', 'warning');
            if(walletBal < price) return Swal.fire('Low Balance', 'Insufficient funds in wallet. Please fund your account.', 'error');

            Swal.fire({
                title: 'Confirm Purchase',
                html: `Are you sure you want to send <b>${planName}</b> to <b>${phone}</b>?<br><br>Cost: <b>₦${price}</b>`,
                icon: 'question', 
                showCancelButton: true, 
                confirmButtonColor: '#0062ff',
                cancelButtonColor: '#1f2937'
            }).then(result => { 
                if(result.isConfirmed) {
                    executePurchase(planId, phone, price, planName); 
                } 
            });
        }

        function executePurchase(id, phoneNum, targetPrice, targetName) {
            Swal.fire({ title: 'Processing Transaction...', html: 'Please wait, debiting wallet...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            // Execute automated database transaction logic to secure pricing rules
            db.ref('users/' + username).transaction(userData => {
                if(userData && userData.wallet >= targetPrice) { 
                    userData.wallet -= targetPrice; 
                    return userData; 
                }
            }).then(transactionResult => {
                if(transactionResult.committed) {
                    Swal.fire({ title: 'Dispatching Order...', html: 'Connecting to API Gateway...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                    // Secure background API execution call via proxy gateway logic
                    let apiServiceId = (currentNetwork + "_" + currentCategory).toLowerCase().replace(" ", "_");
                    if(currentNetwork === "9mobile") apiServiceId = "etisalat_data";

                    let formData = new FormData();
                    formData.append('serviceID', apiServiceId); 
                    formData.append('plan', id);
                    formData.append('api', "Ap_8fe29a8969a042bf6538b658112965fb"); // Kept inside closed execution runtime
                    formData.append('phone', phoneNum);
                    formData.append('requestID', "NX-" + Date.now());

                    fetch('https://gsubz.com/api/pay/', { method: 'POST', body: formData })
                    .then(response => response.json())
                    .then(resData => {
                        if(resData.code == 200 || resData.status === "TRANSACTION_SUCCESSFUL") {
                            Swal.fire('Success!', `Data plan (${targetName}) dispatched to ${phoneNum} successfully.`, 'success'); 
                        } else {
                            // Reverse debit operation if provider gateway rejects authorization
                            db.ref('users/' + username + '/wallet').transaction(currentBal => (currentBal || 0) + targetPrice);
                            Swal.fire('Failed', resData.description || 'Provider rejected order. Wallet auto-refunded.', 'error');
                        }
                    })
                    .catch(error => {
                        // Secure rollback sequence triggered on service loss
                        db.ref('users/' + username + '/wallet').transaction(currentBal => (currentBal || 0) + targetPrice);
                        Swal.fire('Network Timeout', 'API did not respond. Your wallet has been auto-refunded.', 'error');
                    });
                } else {
                    Swal.fire('Error', 'Transaction validation failed. Try again.', 'error');
                }
            });
        }
    </script>
</body>
</html>
