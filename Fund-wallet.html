<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Wallet</title>
    
    <style>
        /* General Page Styling */
        body {
            margin: 0;
            padding: 15px;
            background-color: #0d1117;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }

        /* Blue Wallet Card */
        .wallet-card {
            background: linear-gradient(135deg, #0099ff, #00ccd4);
            border-radius: 24px;
            padding: 25px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0, 153, 255, 0.2);
            margin-bottom: 25px;
        }

        .card-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .balance {
            font-size: 38px;
            font-weight: bold;
            margin: 15px 0;
        }

        .button-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-fund {
            background-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .btn-fund:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        /* Modal Pop-up Styling */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            padding: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .modal-title {
            font-size: 20px;
            color: #0099ff;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .modal-desc {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* Bank Details inside Modal */
        .bank-detail-item {
            background-color: #0d1117;
            border: 1px solid #21262d;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }

        .detail-label {
            font-size: 12px;
            color: #8b949e;
        }

        .detail-value {
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
        }

        /* Buttons Styling */
        .btn-action {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            border: none;
        }

        .btn-copy {
            background-color: #0099ff;
            color: #ffffff;
        }

        .btn-close {
            background-color: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
        }
    </style>
</head>
<body>

    <div class="wallet-card">
        <div class="card-label">Total Balance</div>
        <div class="balance" id="user-balance">₦0.00</div>
        
        <div class="button-group">
            <button class="btn btn-fund" onclick="openFundingModal()">
                💳 Fund
            </button>
            <button class="btn btn-fund" style="opacity: 0.6;">
                📜 History
            </button>
        </div>
    </div>


    <div class="modal-overlay" id="fundModal">
        <div class="modal-box">
            <div class="modal-title">FUND YOUR WALLET</div>
            <div class="modal-desc">Transfer money to this bank account to fund your wallet automatically:</div>
            
            <div class="bank-detail-item">
                <div>
                    <div class="detail-label">BANK NAME</div>
                    <div class="detail-value" id="modal-bank-name">Loading...</div>
                </div>
            </div>

            <div class="bank-detail-item">
                <div>
                    <div class="detail-label">ACCOUNT NUMBER</div>
                    <div class="detail-value" id="modal-account-number">Loading...</div>
                </div>
            </div>

            <div class="bank-detail-item">
                <div>
                    <div class="detail-label">ACCOUNT NAME</div>
                    <div class="detail-value">CM-NEXUS-SUB</div>
                </div>
            </div>

            <button class="btn-action btn-copy" onclick="copyAccountNumber()">COPY ACCOUNT NUMBER</button>
            <button class="btn-action btn-close" onclick="closeFundingModal()">CANCEL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Real Firebase config for CM Nexus sub
        const firebaseConfig = {
            apiKey: "AIzaSyDm6DoHt0g0_B1E8FTxv8jRkbauTVu95Q0",
            authDomain: "cm-nexus-sub.firebaseapp.com",
            databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com",
            projectId: "cm-nexus-sub",
            storageBucket: "cm-nexus-sub.firebasestorage.app",
            messagingSenderId: "22010501991",
            appId: "1:22010501991:web:4140bf159c199f6796edc2"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let userBankNumber = "";

        // Get UID from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');

        if (uid) {
            // 1. Fetch User Balance
            const balanceRef = ref(db, "users/" + uid + "/balance");
            onValue(balanceRef, (snapshot) => {
                if (snapshot.exists()) {
                    let bal = parseFloat(snapshot.val());
                    document.getElementById("user-balance").innerText = "₦" + bal.toLocaleString('en-US', {minimumFractionDigits: 2});
                } else {
                    document.getElementById("user-balance").innerText = "₦0.00";
                }
            });

            // 2. Fetch Bank Details
            const bankRef = ref(db, "users/" + uid + "/bank_details");
            onValue(bankRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    userBankNumber = data.account_number;
                    
                    document.getElementById("modal-bank-name").innerText = data.bank_name;
                    document.getElementById("modal-account-number").innerText = data.account_number;
                } else {
                    document.getElementById("modal-bank-name").innerText = "Not generated yet";
                    document.getElementById("modal-account-number").innerText = "Please try again later";
                }
            });
        } else {
            console.error("UID parameter is missing in the URL!");
            document.getElementById("modal-bank-name").innerText = "Error: No User UID";
            document.getElementById("modal-account-number").innerText = "Please open via App";
        }

        window.openFundingModal = function() {
            document.getElementById("fundModal").style.display = "flex";
        }

        window.closeFundingModal = function() {
            document.getElementById("fundModal").style.display = "none";
        }

        window.copyAccountNumber = function() {
            if (userBankNumber) {
                navigator.clipboard.writeText(userBankNumber).then(() => {
                    alert("Account Number copied: " + userBankNumber);
                }).catch(err => {
                    let tempInput = document.createElement("input");
                    tempInput.value = userBankNumber;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand("copy");
                    document.body.removeChild(tempInput);
                    alert("Account Number copied: " + userBankNumber);
                });
            } else {
                alert("Loading bank details, please wait...");
            }
        }
    </script>
</body>
</html>
