<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Funding | CMchat Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://sdk.monnify.com/plugin/monnify.js"></script>
    
    <style>
        :root { 
            --primary: #0062ff; 
            --accent: #00f2fe; 
            --bg: #0b0f19; 
            --surface: #111827; 
            --border: #1f2937;
            --white: #111827; 
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --gold: #f59e0b;
        }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); }

        header { background: var(--surface); padding: 25px 20px; display: flex; align-items: center; color: var(--text-main); border-bottom: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header i { font-size: 20px; cursor: pointer; margin-right: 15px; }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }

        /* VIRTUAL BANK CARD */
        .bank-card {
            background: linear-gradient(135deg, #0062ff 0%, #00f2fe 100%);
            color: white; padding: 30px 25px; border-radius: 35px;
            margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0, 98, 255, 0.25);
            position: relative; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bank-card::after { content: ''; position: absolute; bottom: -30px; right: -30px; width: 120px; height: 120px; background: rgba(255,255,255,0.15); border-radius: 50%; }

        .card-label { font-size: 11px; font-weight: 600; opacity: 0.9; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; display: block; }
        .acc-number { font-size: 30px; font-weight: 800; letter-spacing: 2px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .bank-info { font-size: 15px; font-weight: 700; color: #ffeb3b; margin-bottom: 20px; }

        .card { background: var(--surface); border-radius: 30px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        input { width: 100%; padding: 20px; border-radius: 20px; border: 2px solid var(--border); outline: none; font-size: 18px; font-weight: 800; color: var(--text-main); background: var(--bg); box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .btn-pay { width: 100%; padding: 20px; border: none; border-radius: 22px; background: var(--primary); color: white; font-weight: 800; font-size: 16px; margin-top: 15px; cursor: pointer; box-shadow: 0 10px 25px rgba(0, 98, 255, 0.2); transition: 0.3s; }
        .btn-pay:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <b>Add Funds</b>
    </header>

    <div class="container">
        
        <div class="bank-card animate__animated animate__fadeInDown">
            <span class="card-label">Automatic Bank Transfer</span>
            <div class="acc-number">
                <span id="accNum">9034567812</span>
                <i class="far fa-copy" onclick="copyAcc()" style="cursor:pointer; font-size:20px;"></i>
            </div>
            <div class="bank-info" id="bankName">Wema Bank / Monnify</div>
            <div style="font-size: 12px; font-weight: 700; opacity: 0.9;" id="accName">Account Name: CM-PRO-LOADING...</div>
        </div>

        <p style="font-size: 11px; font-weight: 800; color: var(--text-muted); margin: 0 0 15px 10px; text-transform: uppercase;">Pay via Card or USSD</p>
        <div class="card animate__animated animate__fadeInUp">
            <input type="number" id="fundAmt" placeholder="Enter Amount (₦)">
            <button class="btn-pay" onclick="payWithMonnify()">
                <i class="fas fa-shield-alt" style="margin-right:8px;"></i> INITIALIZE SECURE PAYMENT
            </button>
        </div>

        <div style="background: rgba(0, 98, 255, 0.05); padding: 20px; border-radius: 20px; font-size: 12px; color: var(--text-muted); margin-top: 25px; border: 1px dashed var(--primary); line-height: 1.6;">
            <i class="fas fa-info-circle" style="color: var(--primary);"></i> Wallet funding is instant. Ensure you use the provided reference for all manual transfers.
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CIKAKKEN LIVE CONFIG NA FIREBASE DLNKA NA GASKE
        const firebaseConfig = {
            apiKey: "AIzaSyDm6DoHt0g0_B1E8FTxv8jRkbauTVu95Q0",
            authDomain: "cm-nexus-sub.firebaseapp.com",
            projectId: "cm-nexus-sub",
            databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com",
            storageBucket: "cm-nexus-sub.firebasestorage.app",
            messagingSenderId: "22010501991",
            appId: "1:22010501991:web:8f84589f0d89ab7496edc2"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myName = localStorage.getItem('username');

        // Tsaro: Idan babu login, korar user baya
        if(!myName) {
            window.location.href = "index.html";
        }

        // MONNIFY API DETAILS DINKA NA GASKE
        const API_KEY = "JNAKW6AD98A4CCQKMFG7SHBYS1J2LX9X"; 
        const CONTRACT_CODE = "1727805127"; 

        document.getElementById('accName').innerText = "Account Name: CM-PRO-" + myName.toUpperCase();

        // 1. DYNAMIC BANK ACCOUNT SYNC (Daga asusun user na gaske)
        db.ref('users/' + myName + '/bankAccount').on('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('accNum').innerText = data.accountNumber || "No Account";
                document.getElementById('bankName').innerText = (data.bankName || "Monnify") + " / Monnify";
            } else {
                // Idan babu bankAccount, nuna loading ko nuna account na asali don tsaro
                document.getElementById('accNum').innerText = "9034567812";
                document.getElementById('bankName').innerText = "Wema Bank / Monnify";
            }
        });

        function copyAcc() {
            const num = document.getElementById('accNum').innerText;
            if(num === "9034567812" || num === "No Account") return;
            navigator.clipboard.writeText(num).then(() => {
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Copied!', showConfirmButton: false, timer: 1500 });
            });
        }

        // 2. LIVE CARD & USSD PAYMENT PROCESS (Automated Credit)
        function payWithMonnify() {
            const amt = parseFloat(document.getElementById('fundAmt').value);
            if(!amt || amt < 100) return Swal.fire('Warning', 'Minimum funding is ₦100', 'warning');

            const transRef = "CM-" + Date.now() + "-" + Math.floor(Math.random() * 1000);

            MonnifySDK.initialize({
                amount: amt,
                currency: "NGN",
                reference: transRef,
                customerFullName: myName,
                customerEmail: myName.replace(/\s+/g, '') + "@cmnexussub.com",
                apiKey: API_KEY,
                contractCode: CONTRACT_CODE,
                paymentDescription: "Wallet Top-up for " + myName,
                isTestMode: false, // LIVE MODE ACTIVE!
                onComplete: function(response) {
                    if(response.status === "SUCCESS") {
                        creditWallet(amt, response.transactionReference);
                    } else {
                        Swal.fire('Failed', 'Payment not successful', 'error');
                    }
                },
                onClose: function(data) { console.log("SDK Closed"); }
            });
        }

        function creditWallet(amt, ref) {
            Swal.fire({ title: 'Crediting Wallet...', html: 'Verifying with payment gateway...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const walletRef = db.ref('users/' + myName + '/wallet');
            walletRef.once('value', snap => {
                const current = parseFloat(snap.val()) || 0;
                const newBalance = current + parseFloat(amt);
                
                walletRef.set(newBalance).then(() => {
                    db.ref('transactions/' + myName).push({
                        type: 'credit',
                        service: 'Monnify Funding',
                        amount: amt,
                        reference: ref,
                        time: Date.now(),
                        status: 'Verified'
                    }).then(() => {
                        Swal.fire('Success!', `₦${Number(amt).toLocaleString()} added to your wallet.`, 'success')
                        .then(() => window.location.href = "Wallet.html");
                    });
                });
            });
        }
    </script>
</body>
</html>
