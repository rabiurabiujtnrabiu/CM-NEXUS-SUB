<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Wallet | CM Nexus Sub</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { margin: 0; padding: 15px; background-color: #0d1117; font-family: 'Plus Jakarta Sans', sans-serif; color: #ffffff; }
        .wallet-card { background: linear-gradient(135deg, #0062ff, #00f2fe); border-radius: 24px; padding: 25px; box-shadow: 0 10px 20px rgba(0, 98, 255, 0.2); margin-bottom: 25px; }
        .card-label { font-size: 14px; text-transform: uppercase; opacity: 0.9; }
        .balance { font-size: 38px; font-weight: bold; margin: 15px 0; }
        .button-group { display: flex; gap: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .btn-fund { background-color: rgba(255, 255, 255, 0.2); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.4); }

        /* Modal Background */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background-color: #161b22; border: 1px solid #30363d; border-radius: 24px; width: 90%; max-width: 380px; padding: 30px; text-align: center; }
        .modal-title { font-size: 20px; color: #0099ff; margin-bottom: 10px; font-weight: 800; }
        .modal-desc { font-size: 13px; color: #8b949e; margin-bottom: 20px; }
        
        /* Input Styling */
        .amount-input { width: 100%; padding: 15px; border-radius: 16px; border: 2px solid #30363d; background: #0d1117; color: white; font-size: 18px; font-weight: bold; text-align: center; outline: none; transition: 0.3s; margin-bottom: 20px; }
        .amount-input:focus { border-color: #0062ff; }

        .btn-pay { width: 100%; padding: 15px; border-radius: 16px; border: none; background: #0062ff; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .btn-cancel { background: transparent; color: #8b949e; cursor: pointer; border: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="wallet-card">
        <div class="card-label">Total Balance</div>
        <div class="balance" id="user-balance">₦0.00</div>
        
        <div class="button-group">
            <button class="btn btn-fund" onclick="openFundingModal()">💳 Fund Wallet</button>
            <button class="btn btn-fund" style="opacity: 0.6;">📜 History</button>
        </div>
    </div>

    <!-- Sabon Modal na OPay Checkout -->
    <div class="modal-overlay" id="fundModal">
        <div class="modal-box">
            <div class="modal-title">FUND WALLET</div>
            <div class="modal-desc">Enter amount to fund your wallet via OPay (Transfer, Card, or Wallet)</div>
            
            <input type="number" id="fund-amount" class="amount-input" placeholder="₦0.00">

            <button class="btn-pay" onclick="initializeOPayPayment()">PROCEED TO PAYMENT</button>
            <button class="btn-cancel" onclick="closeFundingModal()">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDm6DoHt0g0_B1E8FTxv8jRkbauTVu95Q0",
            authDomain: "cm-nexus-sub.firebaseapp.com",
            databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com",
            projectId: "cm-nexus-sub",
            storageBucket: "cm-nexus-sub.firebasestorage.app",
            messagingSenderId: "22010501991",
            appId: "1:22010501991:web:4140bf159c199f6796edc2"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Dauko username daga LocalStorage
        let username = localStorage.getItem('username');
        let userEmail = localStorage.getItem('saved_email') || ""; 
        let userFullName = localStorage.getItem('saved_fullname') || "Nexus User";

        if (username) {
            username = username.toLowerCase().trim();
            const balanceRef = ref(db, "users/" + username + "/wallet");
            onValue(balanceRef, (snapshot) => {
                let bal = snapshot.exists() ? parseFloat(snapshot.val()) : 0;
                document.getElementById("user-balance").innerText = "₦" + bal.toLocaleString('en-US', {minimumFractionDigits: 2});
            });
        }

        window.openFundingModal = function() { document.getElementById("fundModal").style.display = "flex"; }
        window.closeFundingModal = function() { document.getElementById("fundModal").style.display = "none"; }

        // KIRAN OPAY CHECKOUT
        window.initializeOPayPayment = async function() {
            const amount = document.getElementById("fund-amount").value;
            if (!amount || amount < 100) {
                return Swal.fire('Error', 'Minimum funding is ₦100', 'warning');
            }

            Swal.fire({ title: 'Connecting...', html: 'Preparing secure OPay gateway...', didOpen: () => { Swal.showLoading(); } });

            try {
                const response = await fetch('https://cm-nexus-sub.cmnexussub.workers.dev/api/generate-bank', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: "initialize_payment",
                        amount: amount,
                        email: userEmail,
                        fullName: userFullName,
                        username: username
                    })
                });

                const data = await response.json();
                if (data.data && data.data.cashierUrl) {
                    window.location.href = data.data.cashierUrl; // Bude shafin OPay
                } else {
                    Swal.fire('Error', 'Could not generate payment link. Try again.', 'error');
                }
            } catch (err) {
                Swal.fire('Connection Error', 'Please check your internet.', 'error');
            }
        }
    </script>
</body>
</html>
