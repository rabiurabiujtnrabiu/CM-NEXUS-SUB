<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CM Nexus sub - Add Funds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script type="text/javascript" src="https://sdk.monnify.com/v1/sdk.js"></script>
</head>
<body class="bg-[#0b132b] text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-[#111a36] rounded-3xl p-6 shadow-2xl border border-gray-800 animate__animated animate__fadeInUp">
        
        <div class="flex items-center mb-6">
            <button onclick="history.back()" class="text-white hover:text-gray-300 mr-4 text-xl transition-all hover:scale-110">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h1 class="text-xl font-bold tracking-wide">Add Funds</h1>
        </div>

        <div class="bg-gradient-to-r from-[#00b4db] to-[#0083b0] rounded-3xl p-6 mb-6 relative overflow-hidden shadow-lg border border-cyan-500/30">
            <div class="absolute -right-8 -bottom-8 w-32 h-32 bg-white/10 rounded-full"></div>
            
            <p class="text-xs font-semibold tracking-wider text-cyan-100 uppercase mb-2">Automatic Bank Transfer</p>
            
            <div class="flex justify-between items-center mb-3">
                <span id="account-number" class="text-3xl font-extrabold tracking-widest text-white">Generating...</span>
                <button onclick="copyAccountNumber()" class="text-white/80 hover:text-white transition-all text-xl p-2 rounded-lg hover:bg-white/10 active:scale-90" title="Copy Account Number">
                    <i class="fa-regular fa-copy"></i>
                </button>
            </div>
            
            <p id="bank-name" class="text-yellow-300 font-bold text-lg mb-4">Securing Account...</p>
            
            <p class="text-xs text-cyan-50">Account Name: <span id="account-name" class="font-mono bg-black/20 px-2 py-1 rounded">CM-Nexus-sub-...</span></p>
        </div>

        <div id="toast" class="hidden fixed top-5 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg text-sm z-50 transition-all duration-300">
            Account number copied successfully!
        </div>

        <div class="mb-6">
            <p class="text-xs font-semibold text-gray-400 tracking-wider uppercase mb-3">Pay Via Card or USSD</p>
            
            <div class="relative mb-4">
                <input type="number" id="amount" placeholder="Enter Amount (₦)" 
                    class="w-full bg-[#1b264f] border border-gray-700 rounded-2xl py-4 px-5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg font-medium transition-all"
                    required>
            </div>

            <button id="pay-btn" onclick="initializePayment()" 
                class="w-full bg-[#1a73e8] hover:bg-blue-600 text-white font-semibold py-4 px-5 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                <i class="fa-solid fa-shield-halved"></i>
                <span>INITIALIZE SECURE PAYMENT</span>
            </button>
        </div>

        <div class="border border-dashed border-blue-900/50 bg-blue-950/20 rounded-2xl p-4 flex items-start gap-3">
            <i class="fa-solid fa-circle-info text-blue-400 mt-1 animate-pulse"></i>
            <p class="text-xs text-gray-400 leading-relaxed">
                Wallet funding is instant. Ensure you transfer only to the generated accounts assigned to your username on CM Nexus sub.
            </p>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDm6DoHt0g0_B1E8FTxv8jRkbauTVu95Q0",
          authDomain: "cm-nexus-sub.firebaseapp.com",
          databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com",
          projectId: "cm-nexus-sub",
          storageBucket: "cm-nexus-sub.firebasestorage.app",
          messagingSenderId: "22010501991",
          appId: "1:22010501991:web:4140bf159c199f6796edc2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. ZABURAR AUTO-USERNAME DETECTOR (Daga URL ko LocalStorage na Login din hotonka)
        const urlParams = new URLSearchParams(window.location.search);
        let currentUsername = urlParams.get('username') || localStorage.getItem('username');

        // Idan babu shi a ko'ina, muna saita asalin sunanka "rabiujtn" da kake amfani dashi
        if (!currentUsername) {
            currentUsername = "rabiujtn"; 
        }

        const bankDetailsRef = ref(db, 'bank_details/' + currentUsername);

        // Aikin nuna bayanai a jikin screen dinka
        function updateUI(accNo, bankName, accName) {
            document.getElementById('account-number').innerText = accNo;
            document.getElementById('bank-name').innerText = bankName;
            document.getElementById('account-name').innerText = accName;
        }

        // 2. DUBA KO MAI AMFANI YANA DA ACCOUNT A FIREBASE, IDAN BABU KIRA API NAMI AUTOMATIC
        onValue(bankDetailsRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.account_number) {
                // Idan an riga an taba samar masa da account a baya, nuna shi nan take
                updateUI(data.account_number, data.bank_name, data.account_name);
            } else {
                // Idan babu shi, tsarin zai fara kiran Monnify don samar masa da shi live yanzu
                autoGenerateMonnifyAccount();
            }
        });

        // 3. AIKIN KIRA MONNIFY API DON SAMAR DA ACCOUNT NUMBER TA ATOMATIK
        async function autoGenerateMonnifyAccount() {
            try {
                // Karbo Access Token daga Monnify (Wannan mataki ne na tsaro kafin samar da account)
                const authResponse = await fetch('https://api.monnify.com/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        // Muna amfani da API key dinka wajen hada Basic Authorization Header
                        'Authorization': 'Basic ' + btoa("JNAKW6AD98A4CCQKMFG7SHBYS1J2LX9X:SECRET_KEY_DINKA") // NOTE: Saka Secret Key dinka na Monnify a nan maimakon SECRET_KEY_DINKA
                    }
                });
                
                const authData = await authResponse.json();
                const accessToken = authData.responseBody.accessToken;

                // Kira API din samar da ainihin asusun banki
                const reserveResponse = await fetch('https://api.monnify.com/api/v1/bank-transfer/reserved-accounts', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + accessToken,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        "accountReference": "REF-" + currentUsername + "-" + Date.now(),
                        "accountName": "CM-Nexus-sub-" + currentUsername,
                        "currencyCode": "NGN",
                        "contractCode": "1727805127", // Contract Code dinka na gaske
                        "customerEmail": currentUsername + "@cmnexus.com",
                        "customerName": currentUsername,
                        "getAllAvailableBanks": true
                    })
                });

                const reserveData = await reserveResponse.json();

                if (reserveData.requestSuccessful && reserveData.responseBody.accounts.length > 0) {
                    const mainAccount = reserveData.responseBody.accounts[0]; // Zai dauki asusu na farko (misali Wema)
                    
                    const generatedData = {
                        account_number: mainAccount.accountNumber,
                        bank_name: mainAccount.bankName,
                        account_name: mainAccount.accountName
                    };

                    // Adana bayanan asusun bankin a Firebase dinka domin lokaci na gaba ya fito nan take
                    await set(bankDetailsRef, generatedData);
                    
                    // Sabunta fuskar shafinmu
                    updateUI(generatedData.account_number, generatedData.bank_name, generatedData.account_name);
                } else {
                    // Fallback idan Monnify ya dawo da kuskure saboda BVN/KYC limit a account dinka
                    updateUI("5227958615", "Wema Bank / Monnify", "CM-Nexus-sub-" + currentUsername);
                }

            } catch (error) {
                console.error("Failed to generate account automatically: ", error);
                // Idan an samu matsala wajen kiran API dinka, nuna fallback asusun don kada ya tsaya
                updateUI("5227958615", "Wema Bank / Monnify", "CM-Nexus-sub-" + currentUsername);
            }
        }

        // Expose functions for buttons
        window.copyAccountNumber = function() {
            const accountNumber = document.getElementById('account-number').innerText;
            if (accountNumber === "Generating..." || accountNumber === "Loading...") return;

            navigator.clipboard.writeText(accountNumber).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.remove('hidden');
                setTimeout(() => {
                    toast.classList.add('hidden');
                }, 2500);
            });
        }

        window.initializePayment = function() {
            const amount = document.getElementById('amount').value;
            const payBtn = document.getElementById('pay-btn');

            if (!amount || amount <= 0) {
                alert('Please enter a valid deposit amount!');
                return;
            }

            payBtn.disabled = true;
            payBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Processing...`;

            MonnifySDK.initialize({
                amount: parseFloat(amount),
                currency: "NGN",
                reference: "TX-" + Date.now(), 
                customerName: currentUsername, 
                customerEmail: currentUsername + "@cmnexus.com", 
                apiKey: "JNAKW6AD98A4CCQKMFG7SHBYS1J2LX9X", 
                contractCode: "1727805127", 
                paymentDescription: "Wallet Funding via CM Nexus sub",
                isTestMode: false, 
                metadata: {
                    "username": currentUsername
                },
                onComplete: function(response) {
                    if (response.status === "SUCCESSFUL") {
                        alert("Payment successful!");
                        
                        const paymentRef = ref(db, 'payment_requests/' + currentUsername);
                        const newPaymentRef = push(paymentRef);
                        set(newPaymentRef, {
                            amount: parseFloat(amount),
                            status: "success",
                            reference: response.transactionReference,
                            timestamp: Date.now(),
                            method: "monnify_card"
                        });

                        document.getElementById('amount').value = '';
                    } else {
                        alert("Payment failed: " + response.status);
                    }
                    payBtn.disabled = false;
                    payBtn.innerHTML = `<i class="fa-solid fa-shield-halved"></i> INITIALIZE SECURE PAYMENT`;
                },
                onClose: function(data) {
                    alert("Payment window closed.");
                    payBtn.disabled = false;
                    payBtn.innerHTML = `<i class="fa-solid fa-shield-halved"></i> INITIALIZE SECURE PAYMENT`;
                }
            });
        }
    </script>
</body>
</html>
