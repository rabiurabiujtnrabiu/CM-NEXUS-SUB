<!-- BANKE DATA BOX (Copy to Clipboard) -->
<div class="bank-info-box" onclick="copyAccountNumber()">
    <div class="badge badge-en">Make Transfer To</div>
    <h2 id="bank-name">bestStar MFB</h2>
    <h1 id="account-number">2000300022</h1>
    <p id="account-name">RABIU HAMZA</p>
    <p style="font-size: 11px; color: #6c7d93; margin-top: 10px;">Tap to copy account number</p>
</div>

<!-- REFERENCE ID INPUT -->
<div class="input-group">
    <label class="input-label">Reference ID (From Bank Alert)</label>
    <input type="text" id="ref-id" class="amount-input" placeholder="e.g., 123456789">
</div>

<button class="btn-pay" onclick="submitReference()">VERIFY PAYMENT</button>

<!-- LOADING OVERLAY MAI LOGO -->
<div id="loading-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(8, 12, 21, 0.95); z-index:2000; justify-content:center; align-items:center; flex-direction:column;">
    <svg class="rotating-logo" viewBox="0 0 500 500" width="80" height="80">
        <!-- Logo ɗinka da kake da shi -->
        <polygon points="250,45 425,146 425,348 250,449 75,348 75,146" fill="none" stroke="#00f2fe" stroke-width="20" />
        <text x="135" y="290" fill="#ffffff" font-size="130" font-weight="900">CM</text>
    </svg>
    <p style="margin-top: 20px; font-weight: 700; color: #00f2fe;">Verifying Transaction...</p>
</div>

<style>
    .rotating-logo { animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .bank-info-box { background: linear-gradient(135deg, #131926, #1f293d); border: 1px solid #009fff; border-radius: 24px; padding: 25px; text-align: center; margin-bottom: 30px; cursor: pointer; }
</style>

<script>
    function copyAccountNumber() {
        const acc = document.getElementById("account-number").innerText;
        navigator.clipboard.writeText(acc);
        Swal.fire({ toast: true, position: 'top', icon: 'success', title: 'Account number copied!', showConfirmButton: false, timer: 1500 });
    }

    async function submitReference() {
        const refId = document.getElementById("ref-id").value;
        const userId = "rabiujtn";
        const amount = document.getElementById("fund-amount").value;

        if (!refId) return Swal.fire('Error', 'Please enter a Reference ID', 'error');

        // Nuna Logo Loading
        document.getElementById('loading-overlay').style.display = 'flex';

        try {
            const response = await fetch('https://jtn-gateway-engine.cmnexussub.workers.dev', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ refId, userId, amount: parseFloat(amount) })
            });

            const data = await response.json();
            document.getElementById('loading-overlay').style.display = 'none';

            if (data.success) {
                Swal.fire('Success!', data.message, 'success');
            } else {
                Swal.fire('Failed', data.error, 'error');
            }
        } catch (err) {
            document.getElementById('loading-overlay').style.display = 'none';
            Swal.fire('Error', 'Connection failed.', 'error');
        }
    }
</script>
