<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Funding - Add Funds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script type="text/javascript" src="https://sdk.monnify.com/v1/sdk.js"></script>
</head>
<body class="bg-[#0b132b] text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-[#111a36] rounded-3xl p-6 shadow-2xl border border-gray-800 animate__animated animate__fadeInUp">
        
        <div class="flex items-center mb-6">
            <button onclick="history.back()" class="text-white hover:text-gray-300 mr-4 text-xl transition-all hover:scale-110">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h1 class="text-xl font-bold tracking-wide">Add Funds</h1>
        </div>

        <div class="bg-gradient-to-r from-[#00b4db] to-[#0083b0] rounded-3xl p-6 mb-6 relative overflow-hidden shadow-lg border border-cyan-500/30">
            <div class="absolute -right-8 -bottom-8 w-32 h-32 bg-white/10 rounded-full"></div>
            
            <p class="text-xs font-semibold tracking-wider text-cyan-100 uppercase mb-2">Automatic Bank Transfer</p>
            
            <div class="flex justify-between items-center mb-3">
                <span id="account-number" class="text-3xl font-extrabold tracking-widest text-white">Loading...</span>
                <button onclick="copyAccountNumber()" class="text-white/80 hover:text-white transition-all text-xl p-2 rounded-lg hover:bg-white/10 active:scale-90" title="Copy Account Number">
                    <i class="fa-regular fa-copy"></i>
                </button>
            </div>
            
            <p id="bank-name" class="text-yellow-300 font-bold text-lg mb-4">Loading...</p>
            
            <p class="text-xs text-cyan-50">Account Name: <span id="account-name" class="font-mono bg-black/20 px-2 py-1 rounded">Loading...</span></p>
        </div>

        <div id="toast" class="hidden fixed top-5 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg text-sm z-50 transition-all duration-300 animate__animated animate__fadeInDown">
            Account number copied successfully!
        </div>

        <div class="mb-6">
            <p class="text-xs font-semibold text-gray-400 tracking-wider uppercase mb-3">Pay Via Card or USSD</p>
            
            <div class="relative mb-4">
                <input type="number" id="amount" placeholder="Enter Amount (₦)" 
                    class="w-full bg-[#1b264f] border border-gray-700 rounded-2xl py-4 px-5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg font-medium transition-all"
                    required>
            </div>

            <button id="pay-btn" onclick="initializePayment()" 
                class="w-full bg-[#1a73e8] hover:bg-blue-600 text-white font-semibold py-4 px-5 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                <i class="fa-solid fa-shield-halved"></i>
                <span>INITIALIZE SECURE PAYMENT</span>
            </button>
        </div>

        <div class="border border-dashed border-blue-900/50 bg-blue-950/20 rounded-2xl p-4 flex items-start gap-3">
            <i class="fa-solid fa-circle-info text-blue-400 mt-1 animate-pulse"></i>
            <p class="text-xs text-gray-400 leading-relaxed">
                Wallet funding is instant. Ensure you transfer only to the generated accounts assigned to your username.
            </p>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Your Web App's Firebase configuration
        const firebaseConfig = {
          apiKey: "AIzaSyDm6DoHt0g0_B1E8FTxv8jRkbauTVu95Q0",
          authDomain: "cm-nexus-sub.firebaseapp.com",
          databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com",
          projectId: "cm-nexus-sub",
          storageBucket: "cm-nexus-sub.firebasestorage.app",
          messagingSenderId: "22010501991",
          appId: "1:22010501991:web:4140bf159c199f6796edc2"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Active username session placeholder
        const currentUsername = "rab_lujtn"; 

        // Default Fallback Details (If Firebase fetch fails or times out)
        const fallbackDetails = {
            account_number: "5227958615",
            bank_name: "Wema Bank / Monnify",
            account_name: "CM-PRO-rab_lujtn"
        };

        // Function to apply bank details to the UI
        function updateBankUI(accountNumber, bankName, accountName) {
            document.getElementById('account-number').innerText = accountNumber;
            document.getElementById('bank-name').innerText = bankName;
            document.getElementById('account-name').innerText = accountName;
        }

        // Safety Timeout: If Firebase doesn't load within 4 seconds, show fallback details automatically
        const safetyTimeout = setTimeout(() => {
            console.warn("Firebase took too long to respond. Loading fallback bank details.");
            updateBankUI(fallbackDetails.account_number, fallbackDetails.bank_name, fallbackDetails.account_name);
        }, 4000);

        // 1. Listen for Live bank details from Firebase Realtime Database
        try {
            const bankRef = ref(db, 'bank_details/' + currentUsername);
            
            onValue(bankRef, (snapshot) => {
                clearTimeout(safetyTimeout); // Clear safety timeout since we got a response
                const data = snapshot.val();
                
                if (data && data.account_number) {
                    console.log("Firebase Data Loaded Successfully:", data);
                    updateBankUI(
                        data.account_number, 
                        data.bank_name || fallbackDetails.bank_name, 
                        data.account_name || fallbackDetails.account_name
                    );
                } else {
                    console.log("No data found at path 'bank_details/" + currentUsername + "'. Using default details.");
                    updateBankUI(fallbackDetails.account_number, fallbackDetails.bank_name, fallbackDetails.account_name);
                }
            }, (error) => {
                clearTimeout(safetyTimeout);
                console.error("Firebase Database Read Failed: ", error);
                // Force fallback UI if permission is denied or connection failed
                updateBankUI(fallbackDetails.account_number, fallbackDetails.bank_name, fallbackDetails.account_name);
            });
        } catch (err) {
            clearTimeout(safetyTimeout);
            console.error("Initialization Error: ", err);
            updateBankUI(fallbackDetails.account_number, fallbackDetails.bank_name, fallbackDetails.account_name);
        }

        // Expose helper function to window context for module access
        window.copyAccountNumber = function() {
            const accountNumber = document.getElementById('account-number').innerText;
            if (accountNumber === "Loading...") return;

            navigator.clipboard.writeText(accountNumber).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.remove('hidden');
                setTimeout(() => {
                    toast.classList.add('hidden');
                }, 2500);
            });
        }

        // 2. Monnify Live Payment Handler
        window.initializePayment = function() {
            const amount = document.getElementById('amount').value;
            const payBtn = document.getElementById('pay-btn');

            if (!amount || amount <= 0) {
                alert('Please enter a valid deposit amount!');
                return;
            }

            // Disable button and show loader during process initiation
            payBtn.disabled = true;
            payBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Processing...`;

            // Trigger Monnify Payment SDK
            MonnifySDK.initialize({
                amount: parseFloat(amount),
                currency: "NGN",
                reference: "TX-" + Date.now(), 
                customerName: currentUsername, 
                customerEmail: currentUsername + "@cmnexus.com", 
                apiKey: "JNAKW6AD98A4CCQKMFG7SHBYS1J2LX9X", 
                contractCode: "1727805127", 
                paymentDescription: "Wallet Funding via CM-Nexus",
                isTestMode: false, 
                metadata: {
                    "username": currentUsername
                },
                onComplete: function(response) {
                    if (response.status === "SUCCESSFUL") {
                        alert("Payment successful! Your wallet request has been submitted.");
                        
                        const paymentRef = ref(db, 'payment_requests/' + currentUsername);
                        const newPaymentRef = push(paymentRef);
                        set(newPaymentRef, {
                            amount: parseFloat(amount),
                            status: "success",
                            reference: response.transactionReference,
                            timestamp: Date.now(),
                            method: "monnify_card"
                        });

                        document.getElementById('amount').value = '';
                    } else {
                        alert("Payment was not successful: " + response.status);
                    }
                    payBtn.disabled = false;
                    payBtn.innerHTML = `<i class="fa-solid fa-shield-halved"></i> INITIALIZE SECURE PAYMENT`;
                },
                onClose: function(data) {
                    alert("Payment window closed by user.");
                    payBtn.disabled = false;
                    payBtn.innerHTML = `<i class="fa-solid fa-shield-halved"></i> INITIALIZE SECURE PAYMENT`;
                }
            });
        }
    </script>
</body>
</html>
