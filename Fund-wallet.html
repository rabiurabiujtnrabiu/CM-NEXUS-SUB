<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Wallet</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* Tsarin Shafi Gaba daya */
        body {
            margin: 0;
            padding: 15px;
            background-color: #0d1117;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }

        /* Blue Wallet Card (Kamar hoton da ka turo) */
        .wallet-card {
            background: linear-gradient(135deg, #0099ff, #00ccd4);
            border-radius: 24px;
            padding: 25px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0, 153, 255, 0.2);
            margin-bottom: 25px;
        }

        .card-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .balance {
            font-size: 38px;
            font-weight: bold;
            margin: 15px 0;
        }

        .button-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-fund {
            background-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .btn-fund:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        /* Tsarin Pop-up (Modal) na Funding */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            padding: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .modal-title {
            font-size: 20px;
            color: #0099ff;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .modal-desc {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* Bayanan Banki a Cikin Pop-up */
        .bank-detail-item {
            background-color: #0d1117;
            border: 1px solid #21262d;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }

        .detail-label {
            font-size: 12px;
            color: #8b949e;
        }

        .detail-value {
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
        }

        /* Button Copy da Cancel */
        .btn-action {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            border: none;
        }

        .btn-copy {
            background-color: #0099ff;
            color: #ffffff;
        }

        .btn-close {
            background-color: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
        }
    </style>
</head>
<body>

    <div class="wallet-card">
        <div class="card-label">Total Balance</div>
        <div class="balance" id="user-balance">₦0.00</div>
        
        <div class="button-group">
            <button class="btn btn-fund" onclick="openFundingModal()">
                💳 Fund
            </button>
            <button class="btn btn-fund" style="opacity: 0.6;">
                📜 History
            </button>
        </div>
    </div>


    <div class="modal-overlay" id="fundModal">
        <div class="modal-box">
            <div class="modal-title">FUND YOUR WALLET</div>
            <div class="modal-desc">Tura kudi zuwa wannan asusun bankin domin cika wallet dinka ta atomatik:</div>
            
            <div class="bank-detail-item">
                <div>
                    <div class="detail-label">BANK NAME</div>
                    <div class="detail-value" id="modal-bank-name">Ana lodi...</div>
                </div>
            </div>

            <div class="bank-detail-item">
                <div>
                    <div class="detail-label">ACCOUNT NUMBER</div>
                    <div class="detail-value" id="modal-account-number">Ana lodi...</div>
                </div>
            </div>

            <div class="bank-detail-item">
                <div>
                    <div class="detail-label">ACCOUNT NAME</div>
                    <div class="detail-value">CM-NEXUS-SUB</div>
                </div>
            </div>

            <button class="btn-action btn-copy" onclick="copyAccountNumber()">COPY ACCOUNT NUMBER</button>
            <button class="btn-action btn-close" onclick="closeFundingModal()">CANCEL</button>
        </div>
    </div>

    <script>
        // --- MAI GIDA: JADAWALIN FIREBASE DIN KA ---
        // Saka ainihin Firebase Config dinka na App dinka a nan idan babu shi
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:12345:web:12345"
        };
        
        // Fara Firebase idan ba a yi ba
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        let userBankNumber = "";

        // --- DAUKO BALANCE DA BAYANAN BANKI ---
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                const uid = user.uid;

                // 1. Dauko Balance na User ta Atomatik
                firebase.database().ref("Users/" + uid + "/balance").on("value", (snapshot) => {
                    if (snapshot.exists()) {
                        let bal = parseFloat(snapshot.val());
                        document.getElementById("user-balance").innerText = "₦" + bal.toLocaleString('en-US', {minimumFractionDigits: 2});
                    } else {
                        document.getElementById("user-balance").innerText = "₦0.00";
                    }
                });

                // 2. Dauko Bayanan Banki na User
                firebase.database().ref("Users/" + uid + "/bank_details").on("value", (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        userBankNumber = data.account_number;
                        
                        // Zuba bayanan a Pop-up din
                        document.getElementById("modal-bank-name").innerText = data.bank_name;
                        document.getElementById("modal-account-number").innerText = data.account_number;
                    } else {
                        document.getElementById("modal-bank-name").innerText = "Ba a samar ba";
                        document.getElementById("modal-account-number").innerText = "Danna don gwadawa sake";
                    }
                });
            } else {
                console.log("Babu user da ya yi login.");
            }
        });

        // --- DOMIN BUDEWA DA RUFE POP-UP ---
        function openFundingModal() {
            document.getElementById("fundModal").style.display = "flex";
        }

        function closeFundingModal() {
            document.getElementById("fundModal").style.display = "none";
        }

        // --- DOMIN COPY ACCOUNT NUMBER ---
        function copyAccountNumber() {
            if (userBankNumber) {
                navigator.clipboard.writeText(userBankNumber).then(() => {
                    alert("An kwafi Account Number: " + userBankNumber);
                }).catch(err => {
                    // Idan tsohuwar waya ce da ba ta da navigator.clipboard
                    let tempInput = document.createElement("input");
                    tempInput.value = userBankNumber;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand("copy");
                    document.body.removeChild(tempInput);
                    alert("An kwafi Account Number: " + userBankNumber);
                });
            } else {
                alert("Ana kokarin karbo account number tukunna, dan dakata...");
            }
        }
    </script>
</body>
</html>
