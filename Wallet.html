<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Wallet | Elite Arena Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* ASALIN STYLE DIN KA - BAN TABA KO DIGO DAYA BA */
        :root {
            --primary: #1A237E; --accent: #FFD600; --bg: #F4F7FE;
            --white: #ffffff; --success: #2ed573; --danger: #ff4757;
            --grad: linear-gradient(135deg, #1A237E 0%, #3949AB 100%);
            --dark-nav: #0f172a;
        }
        
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #2d3436; padding-bottom: 120px; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }

        header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-greet span { font-size: 12px; color: #8e8e93; font-weight: 600; }
        .user-greet b { font-size: 18px; display: block; color: var(--primary); }

        .wallet-card { 
            margin: 0 20px; padding: 25px; border-radius: 35px; 
            background: var(--grad); color: white; 
            box-shadow: 0 20px 40px rgba(26, 35, 126, 0.25); 
            position: relative; overflow: hidden;
        }
        .balance-label { font-size: 12px; font-weight: 600; opacity: 0.8; letter-spacing: 1px; }
        .balance-amount { font-size: 34px; font-weight: 800; margin: 8px 0 25px; display: flex; align-items: center; gap: 8px; }
        
        .wallet-actions { display: flex; gap: 15px; }
        .action-btn { 
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); 
            padding: 14px; border-radius: 20px; color: white; font-weight: 700; 
            font-size: 12px; backdrop-filter: blur(10px); cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 8px; flex: 1; 
        }

        .services-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 15px 12px; padding: 25px 20px 15px; 
        }
        .service-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .icon-box { 
            width: 58px; height: 58px; background: var(--white); border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 20px; color: var(--primary); 
            box-shadow: 0 8px 18px rgba(0,0,0,0.03); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .service-item span { font-size: 11px; font-weight: 700; color: #636e72; text-align: center; }

        .recent-box { padding: 15px 20px 0; }
        .recent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .transaction { 
            background: var(--white); padding: 16px; border-radius: 24px; 
            display: flex; align-items: center; gap: 15px; margin-bottom: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); 
        }
        .trans-info { flex: 1; }
        .trans-info b { font-size: 14px; display: block; color: #2d3436; }
        .trans-amt { font-weight: 800; font-size: 14px; }

        .bottom-nav { 
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            background: var(--dark-nav); height: 75px; border-radius: 24px; 
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 15px 35px rgba(15, 23, 42, 0.4); z-index: 2000; padding: 0 10px;
        }
        .nav-item { 
            text-decoration: none; color: #64748b; 
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            width: 70px; font-size: 10px; font-weight: 800; text-transform: uppercase;
        }
        .nav-item i { font-size: 24px; }
        .nav-item.active { color: #38bdf8; transform: translateY(-8px); }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); 
            z-index: 2500; display: none; align-items: flex-end; 
        }
        .modal-content { 
            background: var(--bg); width: 100%; border-radius: 45px 45px 0 0; 
            padding: 35px 25px; 
        }
        .bank-box { background: var(--grad); color: white; padding: 25px; border-radius: 28px; margin: 20px 0; text-align: center; min-height: 120px; }
        .btn-pay { width: 100%; padding: 20px; border: none; border-radius: 20px; background: var(--primary); color: white; font-weight: 800; font-size: 16px; }
    </style>
</head>
<body>

    <header>
        <div class="user-greet">
            <span>Elite Member</span>
            <b id="walletUser">User Name</b>
        </div>
        <div class="icon-box" style="width:45px; height:45px; border-radius:15px; font-size:18px;" onclick="location.reload()">
            <i class="fas fa-redo-alt"></i>
        </div>
    </header>

    <div class="wallet-card animate__animated animate__fadeInDown">
        <div class="balance-label">TOTAL BALANCE</div>
        <div class="balance-amount">₦<span id="balance">0.00</span></div>
        <div class="wallet-actions">
            <button class="action-btn" onclick="openFund()"><i class="fas fa-wallet"></i> Fund</button>
            <button class="action-btn" onclick="location.href='History.html'"><i class="fas fa-receipt"></i> History</button>
        </div>
    </div>

    <div class="services-grid animate__animated animate__fadeInUp">
        <div class="service-item" onclick="location.href='VTU.html'"><div class="icon-box" style="background:#e0f2fe; color:#0369a1;"><i class="fas fa-signal"></i></div><span>Data</span></div>
        <div class="service-item" onclick="location.href='Airtime.html'"><div class="icon-box" style="background:#dcfce7; color:#15803d;"><i class="fas fa-mobile-alt"></i></div><span>Airtime</span></div>
        <div class="service-item" onclick="location.href='TV.html'"><div class="icon-box" style="background:#f3e8ff; color:#7e22ce;"><i class="fas fa-tv"></i></div><span>Cable</span></div>
        <div class="service-item" onclick="location.href='Electricity.html'"><div class="icon-box" style="background:#fef3c7; color:#b45309;"><i class="fas fa-bolt"></i></div><span>Electricity</span></div>
        <div class="service-item" onclick="location.href='Withdraw.html'"><div class="icon-box" style="background:#fee2e2; color:#b91c1c;"><i class="fa-solid fa-money-bill-transfer"></i></div><span>Withdraw</span></div>
        <div class="service-item" onclick="location.href='Education.html'"><div class="icon-box" style="background:#e0f7fa; color:#00838f;"><i class="fa-solid fa-graduation-cap"></i></div><span>Edu PIN</span></div>
        <div class="service-item" onclick="location.href='RechargePin.html'"><div class="icon-box" style="background:#fff3e0; color:#e65100;"><i class="fa-solid fa-receipt"></i></div><span>Recharge PIN</span></div>
        <div class="service-item" onclick="location.href='AirtimeSwap.html'"><div class="icon-box" style="background:#e8eaf6; color:#1a237e;"><i class="fa-solid fa-arrow-rotate-left"></i></div><span>Swap</span></div>
    </div>

    <div class="recent-box">
        <div class="recent-header"><b style="font-size: 16px;">Recent Activity</b></div>
        <div id="miniHistory"></div>
    </div>

    <nav class="bottom-nav">
        <a href="Fund-wallet.html" class="nav-item"><i class="fa-solid fa-house-chimney"></i><span>Hub</span></a>
        <a href="CM-ARENA.html" class="nav-item"><i class="fa-solid fa-shield-halved"></i><span>Arena</span></a>
        <a href="Wallet.html" class="nav-item active"><i class="fa-solid fa-wallet"></i><span>Wallet</span></a>
        <a href="Settings.html" class="nav-item"><i class="fa-solid fa-sliders"></i><span>Settings</span></a>
    </nav>

    <div id="fundOverlay" class="overlay">
        <div class="modal-content animate__animated animate__slideInUp">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <b style="font-size: 20px;">Add Funds</b>
                <i class="fas fa-times-circle" style="font-size:26px; color:#ccc;" onclick="closeFund()"></i>
            </div>
            
            <div class="bank-box" id="monnifyDisplay">
                <p style="font-size: 11px; font-weight: 700; opacity: 0.8; margin-bottom: 10px;">AUTOMATED BANK TRANSFER</p>
                <div id="accNo" style="font-size:26px; font-weight:800; letter-spacing: 1px;">Loading...</div>
                <p id="bankName" style="font-size:12px; font-weight:600; margin-top: 5px;">Elite Arena Account</p>
            </div>
            <button class="btn-pay" onclick="location.href='FundWallet.html'">PROCEED TO FUNDING</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myName = localStorage.getItem('username') || "Elite_User";
        document.getElementById('walletUser').innerText = myName;

        // MONNIFY API SETTINGS (JNAKW6AD98A4CCQKMFG7SHBYS1J2LX9X)
        const MONNIFY_API_KEY = "JNAKW6AD98A4CCQKMFG7SHBYS1J2LX9X";
        const CONTRACT_CODE = "1727805127";

        // SYNC BALANCE
        db.ref('users/' + myName + '/wallet').on('value', snap => {
            document.getElementById('balance').innerText = Number(snap.val() || 0).toLocaleString('en-NG', { minimumFractionDigits: 2 });
        });

        // SYNC BANK DETAILS (MONNIFY LIVE)
        db.ref('users/' + myName + '/bankAccount').on('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('accNo').innerText = data.accountNumber;
                document.getElementById('bankName').innerText = data.bankName + " / Elite Arena";
            } else {
                document.getElementById('accNo').innerText = "Generating...";
                // Dandalin zai iya kirawo API anan idan babu account
            }
        });

        // RECENT ACTIVITY
        db.ref('transactions/' + myName).limitToLast(4).on('value', snap => {
            const list = document.getElementById('miniHistory');
            list.innerHTML = "";
            snap.forEach(child => {
                const t = child.val();
                const isDebit = t.type === 'debit';
                list.innerHTML = `
                    <div class="transaction animate__animated animate__fadeInUp">
                        <div class="trans-info"><b>${t.service}</b><small>${new Date(t.time).toLocaleString()}</small></div>
                        <div class="trans-amt" style="color:${isDebit ? 'var(--danger)' : 'var(--success)'}">${isDebit ? '-' : '+'}₦${Number(t.amount).toLocaleString()}</div>
                    </div>` + list.innerHTML;
            });
        });

        function openFund() { document.getElementById('fundOverlay').style.display = 'flex'; }
        function closeFund() { document.getElementById('fundOverlay').style.display = 'none'; }
    </script>
</body>
</html>
