<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Electricity Payment | Elite Arena Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* ASALIN STYLE DIN KA - BAN TABA KO DIGO DAYA BA */
        :root {
            --primary: #1A237E; --accent: #FFD600; --bg: #F4F7FE; --white: #ffffff;
            --text-main: #1e293b; --text-dim: #64748b; --border: #e2e8f0; --glow: rgba(26, 35, 126, 0.15);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); padding-bottom: 50px; overflow-x: hidden; }

        header { 
            padding: 20px; display: flex; align-items: center; gap: 15px; 
            background: var(--white); border-bottom: 1px solid rgba(0,0,0,0.02);
            position: sticky; top: 0; z-index: 1000;
        }
        .back-btn { font-size: 20px; color: var(--primary); cursor: pointer; transition: 0.2s; }
        header h1 { font-size: 18px; font-weight: 800; margin: 0; color: var(--primary); letter-spacing: -0.5px; }

        .balance-badge {
            background: var(--white); margin: 20px; padding: 18px 24px; 
            border-radius: 24px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(26, 35, 126, 0.03); border: 1px solid rgba(26, 35, 126, 0.04);
        }
        .balance-badge b { font-size: 17px; color: var(--primary); font-weight: 800; }

        .form-container { 
            background: var(--white); margin: 0 20px; padding: 30px 24px; 
            border-radius: 32px; box-shadow: 0 15px 35px rgba(0,0,0,0.02); 
        }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 12px; }

        /* GRID SYSTEM DON DISCOS 12 */
        .disco-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; 
            max-height: 310px; overflow-y: auto; padding: 8px; background: #f8fafc; border-radius: 20px;
        }
        .disco-btn {
            background: #ffffff; border: 2px solid #e2e8f0; border-radius: 18px; padding: 14px 5px;
            display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: 0.3s;
        }
        .disco-btn i { font-size: 20px; color: #f59e0b; }
        .disco-btn span { font-size: 10px; font-weight: 800; color: var(--text-dim); }
        .disco-btn.selected { border-color: var(--primary); box-shadow: 0 8px 20px var(--glow); }

        .btn-verify {
            padding: 16px 22px; border: none; border-radius: 20px;
            background: #e0f2fe; color: #0369a1; font-weight: 800; font-size: 13px; cursor: pointer;
        }
        .meter-card {
            background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d;
            padding: 15px 20px; border-radius: 20px; font-weight: 700; font-size: 13px;
            margin-bottom: 20px; display: none; align-items: center; gap: 10px;
        }

        input, select { width: 100%; padding: 16px 20px; border-radius: 20px; border: 2px solid #e2e8f0; font-size: 14px; font-weight: 700; background: #f8fafc; outline: none; }
        
        .btn-purchase {
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            background: var(--primary); color: var(--white); font-weight: 800; font-size: 15px;
            box-shadow: 0 10px 25px rgba(26, 35, 126, 0.25); cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="location.href='Wallet.html'"><i class="fas fa-arrow-left"></i></div>
        <h1>Pay Electricity Bill</h1>
    </header>

    <div class="balance-badge">
        <span>Available Balance</span>
        <b id="walletBal">₦0.00</b>
    </div>

    <div class="form-container animate__animated animate__fadeInUp">
        <div class="form-group">
            <label>Select Electricity Provider</label>
            <div class="disco-grid">
                <div class="disco-btn" id="disco_aedc" onclick="selectDisco('AEDC')"><i class="fas fa-bolt"></i><span>AEDC (Abuja)</span></div>
                <div class="disco-btn" id="disco_ekedc" onclick="selectDisco('EKEDC')"><i class="fas fa-bolt"></i><span>EKEDC (Eko)</span></div>
                <div class="disco-btn" id="disco_ibedc" onclick="selectDisco('IBEDC')"><i class="fas fa-bolt"></i><span>IBEDC (Ibadan)</span></div>
                <div class="disco-btn" id="disco_ikedc" onclick="selectDisco('IKEDC')"><i class="fas fa-bolt"></i><span>IKEDC (Ikeja)</span></div>
                <div class="disco-btn" id="disco_kaedco" onclick="selectDisco('KAEDCO')"><i class="fas fa-bolt"></i><span>KAEDCO (Kaduna)</span></div>
                <div class="disco-btn" id="disco_kedco" onclick="selectDisco('KEDCO')"><i class="fas fa-bolt"></i><span>KEDCO (Kano)</span></div>
                <div class="disco-btn" id="disco_jed" onclick="selectDisco('JED')"><i class="fas fa-bolt"></i><span>JED (Jos)</span></div>
                <div class="disco-btn" id="disco_phed" onclick="selectDisco('PHED')"><i class="fas fa-bolt"></i><span>PHED (Port H.)</span></div>
                <div class="disco-btn" id="disco_eedc" onclick="selectDisco('EEDC')"><i class="fas fa-bolt"></i><span>EEDC (Enugu)</span></div>
                <div class="disco-btn" id="disco_bedc" onclick="selectDisco('BEDC')"><i class="fas fa-bolt"></i><span>BEDC (Benin)</span></div>
                <div class="disco-btn" id="disco_aple" onclick="selectDisco('APLE')"><i class="fas fa-bolt"></i><span>APLE (Aba)</span></div>
                <div class="disco-btn" id="disco_yedc" onclick="selectDisco('YEDC')"><i class="fas fa-bolt"></i><span>YEDC (Yola)</span></div>
            </div>
        </div>

        <div class="form-group">
            <label>Meter Type</label>
            <select id="meterType" onchange="resetVerify()">
                <option value="prepaid">Prepaid (Smart Token)</option>
                <option value="postpaid">Postpaid (Monthly Bill)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Meter Number</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="meterNo" placeholder="Enter meter number">
                <button class="btn-verify" onclick="validateMeter()">VERIFY</button>
            </div>
        </div>

        <div class="meter-card" id="meterCard">
            <i class="fas fa-user-check"></i><span id="ownerName">...</span>
        </div>

        <div class="form-group">
            <label>Amount (₦)</label>
            <input type="number" id="rechargeAmt" placeholder="Minimum ₦500" oninput="updatePrice()">
        </div>

        <button class="btn-purchase" onclick="processPayment()" id="buyBtn">PROCEED</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myName = localStorage.getItem('username') || "Elite_User";
        const GSUBZ_KEY = "Ap_8fe29a8969a042bf6538b658112965fb";
        const MY_MARGIN = 50; 

        let currentBal = 0; let selectedDisco = ""; let verified = false;

        db.ref('users/' + myName + '/wallet').on('value', snap => {
            currentBal = parseFloat(snap.val()) || 0;
            document.getElementById('walletBal').innerText = "₦" + currentBal.toLocaleString();
        });

        function selectDisco(name) {
            selectedDisco = name; verified = false;
            document.querySelectorAll('.disco-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('disco_' + name.toLowerCase()).classList.add('selected');
            document.getElementById('meterCard').style.display = 'none';
        }

        function resetVerify() { verified = false; document.getElementById('meterCard').style.display = 'none'; }

        async function validateMeter() {
            const meter = document.getElementById('meterNo').value.trim();
            const type = document.getElementById('meterType').value;
            if (!selectedDisco || meter.length < 5) return Swal.fire('Error', 'Select Disco and enter meter number', 'warning');

            Swal.fire({ title: 'Verifying...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const vUrl = `https://gsubz.com/api/customer-validation/?api=${GSUBZ_KEY}&serviceID=${selectedDisco.toLowerCase()}&type=${type}&number=${meter}`;
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(vUrl)}`;

            try {
                const res = await fetch(proxy);
                const json = await res.json();
                const d = JSON.parse(json.contents);
                if (d.code == 200 || d.status === "success") {
                    document.getElementById('ownerName').innerText = "Name: " + (d.name || d.customer_name || "Verified Customer");
                    document.getElementById('meterCard').style.display = 'flex';
                    verified = true; Swal.close();
                } else { Swal.fire('Error', d.description || 'Invalid Meter', 'error'); }
            } catch (e) { Swal.fire('Error', 'Connection timeout.', 'error'); }
        }

        function updatePrice() {
            const amt = parseFloat(document.getElementById('rechargeAmt').value);
            document.getElementById('buyBtn').innerText = amt ? `PAY ₦${(amt + MY_MARGIN).toLocaleString()}` : "PROCEED";
        }

        function processPayment() {
            const amt = parseFloat(document.getElementById('rechargeAmt').value);
            if (!verified || isNaN(amt) || amt < 500) return Swal.fire('Error', 'Verify meter and enter valid amount.', 'warning');
            const total = amt + MY_MARGIN;
            if (currentBal < total) return Swal.fire('Error', 'Insufficient Wallet Balance.', 'error');

            Swal.fire({
                title: 'Confirm', text: `Pay ₦${amt.toLocaleString()} for meter ${document.getElementById('meterNo').value}?`,
                showCancelButton: true, confirmButtonColor: '#1A237E'
            }).then(r => { if(r.isConfirmed) executePayment(amt, total); });
        }

        async function executePayment(amt, total) {
            const meter = document.getElementById('meterNo').value;
            const type = document.getElementById('meterType').value;
            Swal.showLoading();

            db.ref('users/' + myName).transaction(user => {
                if (user && user.wallet >= total) { user.wallet -= total; return user; }
            }).then(async tx => {
                if (tx.committed) {
                    let fd = new FormData();
                    fd.append('api', GSUBZ_KEY); fd.append('serviceID', selectedDisco.toLowerCase());
                    fd.append('type', type); fd.append('number', meter);
                    fd.append('amount', amt); fd.append('requestID', "EL-" + Date.now());

                    try {
                        const res = await fetch('https://gsubz.com/api/pay/', { method: 'POST', body: fd });
                        const d = await res.json();
                        if (d.code == 200) {
                            db.ref('transactions/' + myName).push({ type: 'debit', service: `Electric: ${selectedDisco}`, amount: total, time: Date.now() });
                            Swal.fire({ icon: 'success', title: 'Successful!', html: `Token: <b>${d.token || 'Successful'}</b>` });
                        } else {
                            db.ref('users/' + myName + '/wallet').transaction(w => (w || 0) + total);
                            Swal.fire('Failed', d.description || 'Provider error.', 'error');
                        }
                    } catch (e) {
                        db.ref('users/' + myName + '/wallet').transaction(w => (w || 0) + total);
                        Swal.fire('Error', 'Timeout. Wallet refunded.', 'error');
                    }
                }
            });
        }
    </script>
</body>
</html>
