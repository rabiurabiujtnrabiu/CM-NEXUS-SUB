<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Electricity Payment | Elite Arena Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #0062ff; 
            --accent: #00f2fe; 
            --bg: #0b0f19; /* Duhun gaba daya dandalin */
            --surface: #111827; 
            --border: #1f2937; 
            --white: #111827;
            --text-main: #f9fafb; 
            --text-dim: #9ca3af; 
            --glow: rgba(0, 98, 255, 0.15);
            --gold: #f59e0b;
            --success: #10b981;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); padding-bottom: 50px; overflow-x: hidden; }

        header { 
            padding: 20px; display: flex; align-items: center; gap: 15px; 
            background: var(--surface); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .back-btn { font-size: 20px; color: var(--text-main); cursor: pointer; transition: 0.2s; }
        .back-btn:active { transform: scale(0.85); }
        header h1 { font-size: 18px; font-weight: 800; margin: 0; color: var(--text-main); letter-spacing: -0.5px; }

        .balance-badge {
            background: var(--surface); margin: 20px; padding: 18px 24px; 
            border-radius: 24px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); border: 1px solid var(--border);
        }
        .balance-badge span { font-size: 11px; color: var(--text-dim); font-weight: 800; text-transform: uppercase; }
        .balance-badge b { font-size: 17px; color: var(--primary); font-weight: 800; }

        .form-container { 
            background: var(--surface); margin: 0 20px; padding: 30px 24px; 
            border-radius: 32px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border: 1px solid var(--border);
        }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }

        /* GRID SYSTEM DON DISCOS 12 */
        .disco-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; 
            max-height: 280px; overflow-y: auto; padding: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px;
        }
        .disco-btn {
            background: var(--surface); border: 2px solid var(--border); border-radius: 18px; padding: 14px 5px;
            display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: 0.3s;
        }
        .disco-btn i { font-size: 20px; color: var(--gold); }
        .disco-btn span { font-size: 10px; font-weight: 800; color: var(--text-dim); text-align: center; }
        .disco-btn.selected { border-color: var(--primary); background: var(--surface); box-shadow: 0 8px 20px var(--glow); }

        .btn-verify {
            padding: 16px 22px; border: none; border-radius: 20px;
            background: rgba(0, 98, 255, 0.1); color: var(--primary); font-weight: 800; font-size: 13px; cursor: pointer; transition: 0.3s;
        }
        .btn-verify:active { transform: scale(0.95); }
        
        .meter-card {
            background: rgba(16, 185, 129, 0.1); border: 1px dashed rgba(16, 185, 129, 0.3); color: var(--success);
            padding: 15px 20px; border-radius: 20px; font-weight: 700; font-size: 13px;
            margin-bottom: 20px; display: none; align-items: center; gap: 10px;
        }

        input, select { width: 100%; padding: 16px 20px; border-radius: 20px; border: 2px solid var(--border); font-size: 14px; font-weight: 700; color: var(--text-main); background: var(--bg); outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .btn-purchase {
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            background: var(--primary); color: white; font-weight: 800; font-size: 15px;
            box-shadow: 0 10px 25px rgba(0, 98, 255, 0.25); cursor: pointer; transition: 0.3s;
        }
        .btn-purchase:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="location.href='Wallet.html'"><i class="fas fa-arrow-left"></i></div>
        <h1>Pay Electricity Bill</h1>
    </header>

    <div class="balance-badge">
        <span>Available Balance</span>
        <b id="walletBal">₦0.00</b>
    </div>

    <div class="form-container animate__animated animate__fadeInUp">
        <div class="form-group">
            <label>Select Electricity Provider</label>
            <div class="disco-grid">
                <div class="disco-btn" id="disco_aedc" onclick="selectDisco('AEDC')"><i class="fas fa-bolt"></i><span>AEDC (Abuja)</span></div>
                <div class="disco-btn" id="disco_ekedc" onclick="selectDisco('EKEDC')"><i class="fas fa-bolt"></i><span>EKEDC (Eko)</span></div>
                <div class="disco-btn" id="disco_ibedc" onclick="selectDisco('IBEDC')"><i class="fas fa-bolt"></i><span>IBEDC (Ibadan)</span></div>
                <div class="disco-btn" id="disco_ikedc" onclick="selectDisco('IKEDC')"><i class="fas fa-bolt"></i><span>IKEDC (Ikeja)</span></div>
                <div class="disco-btn" id="disco_kaedco" onclick="selectDisco('KAEDCO')"><i class="fas fa-bolt"></i><span>KAEDCO (Kaduna)</span></div>
                <div class="disco-btn" id="disco_kedco" onclick="selectDisco('KEDCO')"><i class="fas fa-bolt"></i><span>KEDCO (Kano)</span></div>
                <div class="disco-btn" id="disco_jed" onclick="selectDisco('JED')"><i class="fas fa-bolt"></i><span>JED (Jos)</span></div>
                <div class="disco-btn" id="disco_phed" onclick="selectDisco('PHED')"><i class="fas fa-bolt"></i><span>PHED (Port H.)</span></div>
                <div class="disco-btn" id="disco_eedc" onclick="selectDisco('EEDC')"><i class="fas fa-bolt"></i><span>EEDC (Enugu)</span></div>
                <div class="disco-btn" id="disco_bedc" onclick="selectDisco('BEDC')"><i class="fas fa-bolt"></i><span>BEDC (Benin)</span></div>
                <div class="disco-btn" id="disco_aple" onclick="selectDisco('APLE')"><i class="fas fa-bolt"></i><span>APLE (Aba)</span></div>
                <div class="disco-btn" id="disco_yedc" onclick="selectDisco('YEDC')"><i class="fas fa-bolt"></i><span>YEDC (Yola)</span></div>
            </div>
        </div>

        <div class="form-group">
            <label>Meter Type</label>
            <select id="meterType" onchange="resetVerify()">
                <option value="prepaid">Prepaid (Smart Token)</option>
                <option value="postpaid">Postpaid (Monthly Bill)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Meter Number</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="meterNo" placeholder="Enter meter number" oninput="resetVerify()">
                <button class="btn-verify" onclick="validateMeter()">VERIFY</button>
            </div>
        </div>

        <div class="meter-card" id="meterCard">
            <i class="fas fa-user-check"></i><span id="ownerName">...</span>
        </div>

        <div class="form-group">
            <label>Amount (₦)</label>
            <input type="number" id="rechargeAmt" placeholder="Minimum ₦500" oninput="updatePrice()">
        </div>

        <button class="btn-purchase" onclick="processPayment()" id="buyBtn">PROCEED</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CIKAKKEN LIVE CONFIG NA FIREBASE DLNKA NA GASKE
        const firebaseConfig = {
            apiKey: "AIzaSyDm6DoHt0g0_B1E8FTxv8jRkbauTVu95Q0",
            authDomain: "cm-nexus-sub.firebaseapp.com",
            projectId: "cm-nexus-sub",
            databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com",
            storageBucket: "cm-nexus-sub.firebasestorage.app",
            messagingSenderId: "22010501991",
            appId: "1:22010501991:web:8f84589f0d89ab7496edc2"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myName = localStorage.getItem('username');

        // Tsaro: Idan babu login, korar user baya
        if(!myName) {
            window.location.href = "index.html";
        }

        const GSUBZ_KEY = "Ap_8fe29a8969a042bf6538b658112965fb";
        const MY_MARGIN = 50; 

        let currentBal = 0; let selectedDisco = ""; let verified = false;

        // SYNC BALANCE LIVE
        db.ref('users/' + myName + '/wallet').on('value', snap => {
            currentBal = parseFloat(snap.val()) || 0;
            document.getElementById('walletBal').innerText = "₦" + currentBal.toLocaleString('en-US', { minimumFractionDigits: 2 });
        });

        function selectDisco(name) {
            selectedDisco = name; verified = false;
            document.querySelectorAll('.disco-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('disco_' + name.toLowerCase()).classList.add('selected');
            document.getElementById('meterCard').style.display = 'none';
        }

        function resetVerify() { verified = false; document.getElementById('meterCard').style.display = 'none'; }

        // METER NUMBER VALIDATION WITH CODEDABS PROXY
        async function validateMeter() {
            const meter = document.getElementById('meterNo').value.trim();
            const type = document.getElementById('meterType').value;
            if (!selectedDisco) return Swal.fire('Required', 'Please select an electricity provider (Disco) first.', 'warning');
            if (meter.length < 5) return Swal.fire('Required', 'Please enter a valid meter number.', 'warning');

            Swal.fire({ title: 'Verifying Meter details...', html: 'Connecting to GSubz Gateway...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const vUrl = `https://gsubz.com/api/customer-validation/?api=${GSUBZ_KEY}&serviceID=${selectedDisco.toLowerCase()}&type=${type}&number=${meter}`;
            const proxy = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(vUrl)}`;

            try {
                const res = await fetch(proxy);
                const d = await res.json();
                
                if (d.code == 200 || d.status === "success") {
                    document.getElementById('ownerName').innerText = "Name: " + (d.name || d.customer_name || "Verified Customer");
                    document.getElementById('meterCard').style.display = 'flex';
                    verified = true; 
                    Swal.close();
                } else { 
                    Swal.fire('Error', d.description || 'Invalid Meter Number. Double check and try again.', 'error'); 
                }
            } catch (e) { 
                Swal.fire('Fetch Error', 'Validation gateway timed out. Please try again.', 'warning'); 
                console.error(e);
            }
        }

        function updatePrice() {
            const amt = parseFloat(document.getElementById('rechargeAmt').value);
            document.getElementById('buyBtn').innerText = amt ? `PAY ₦${(amt + MY_MARGIN).toLocaleString()}` : "PROCEED";
        }

        function processPayment() {
            const amt = parseFloat(document.getElementById('rechargeAmt').value);
            const meter = document.getElementById('meterNo').value.trim();

            if (!verified) return Swal.fire('Required', 'Please click VERIFY to validate your meter number.', 'warning');
            if (isNaN(amt) || amt < 500) return Swal.fire('Required', 'Minimum recharge amount is ₦500.', 'warning');
            
            const total = amt + MY_MARGIN;
            if (currentBal < total) return Swal.fire('Error', 'Insufficient wallet balance. Please fund your account.', 'error');

            Swal.fire({
                title: 'Confirm Payment', 
                html: `Are you sure you want to recharge <b>₦${amt.toLocaleString()}</b> for meter number <b>${meter}</b> (${selectedDisco})?<br><br>Total Charge: <b>₦${total.toLocaleString()}</b>`,
                showCancelButton: true, 
                confirmButtonColor: '#0062ff',
                cancelButtonColor: '#1f2937'
            }).then(r => { if(r.isConfirmed) executePayment(amt, total); });
        }

        async function executePayment(amt, total) {
            const meter = document.getElementById('meterNo').value.trim();
            const type = document.getElementById('meterType').value;
            Swal.fire({ title: 'Processing Transaction...', html: 'Charging wallet balance...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            // 1. DEBIT THE USER WALLET FIRST
            db.ref('users/' + myName).transaction(user => {
                if (user && user.wallet >= total) { 
                    user.wallet -= total; 
                    return user; 
                }
            }).then(async tx => {
                if (tx.committed) {
                    Swal.fire({ title: 'Generating Token...', html: 'Generating meter code from GSubz API...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                    let fd = new FormData();
                    fd.append('api', GSUBZ_KEY); 
                    fd.append('serviceID', selectedDisco.toLowerCase());
                    fd.append('type', type); 
                    fd.append('number', meter);
                    fd.append('amount', amt); 
                    fd.append('requestID', "EL-" + Date.now());

                    try {
                        const res = await fetch('https://gsubz.com/api/pay/', { method: 'POST', body: fd });
                        const d = await res.json();
                        
                        if (d.code == 200 || d.status === "TRANSACTION_SUCCESSFUL") {
                            const tokenCode = d.token || d.pin || d.description || "Payment Successful!";
                            
                            // 2. WRITE DEBIT TRANSACTION TO HISTORY
                            db.ref('transactions/' + myName).push({ 
                                type: 'debit', 
                                service: `Electric: ${selectedDisco} (${meter})`, 
                                amount: total, 
                                token_details: tokenCode,
                                time: Date.now() 
                            }).then(() => {
                                Swal.fire({ 
                                    icon: 'success', 
                                    title: 'Payment Successful!', 
                                    html: `
                                        <p style="font-size:12px; margin-bottom:10px;">Here is your meter recharge token:</p>
                                        <div style="background:#0b0f19; color:#00f2fe; padding:20px; border-radius:15px; font-family:monospace; font-size:18px; text-align:center; border:1px solid #1f2937; letter-spacing:1px;">
                                            <b>${tokenCode}</b>
                                        </div>
                                        <p style="font-size:11px; color:#ff9800; margin-top:10px;">This details has been stored in your Transactions History page.</p>
                                    `,
                                    confirmButtonText: 'Done',
                                    confirmButtonColor: '#0062ff'
                                });
                                resetVerify();
                                document.getElementById('rechargeAmt').value = "";
                            });
                        } else {
                            // Idan GSubz ya dawo da kuskure, mayar wa user da kudin wallet dinsa (Refund)
                            db.ref('users/' + myName + '/wallet').transaction(w => (w || 0) + total);
                            Swal.fire('Failed', d.description || 'Provider gateway rejected payment. Wallet refunded.', 'error');
                        }
                    } catch (e) {
                        // Idan network ya katse, mayar wa user da kudin wallet dinsa (Refund)
                        db.ref('users/' + myName + '/wallet').transaction(w => (w || 0) + total);
                        Swal.fire('Network Timeout', 'API did not respond in time. Wallet has been safely auto-refunded.', 'error');
                        console.error(e);
                    }
                } else {
                    Swal.fire('Error', 'Transaction rejected. Insufficient balance.', 'error');
                }
            });
        }
    </script>
</body>
</html>
