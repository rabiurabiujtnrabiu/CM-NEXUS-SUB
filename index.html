<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Access Portal | CM Nexus Sub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --primary: #0062ff; --dark: #0b0f19; --text-main: #f9fafb; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        body { background: var(--dark); color: var(--text-main); height: 100vh; display: flex; justify-content: center; align-items: center; }

        .wrapper { width: 100%; max-width: 420px; height: 100%; position: relative; }

        /* Onboarding Slider Styles */
        #onboardingScreen { height: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .slider-card { width: 90%; height: 60vh; background: #131926; border-radius: 30px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .slider-img { width: 100%; height: 100%; object-fit: cover; }
        
        .status-bar { width: 90%; height: 5px; background: #1f2937; border-radius: 5px; margin-bottom: 20px; }
        #progress { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }

        .controls { width: 90%; display: flex; gap: 15px; }
        .btn-action { flex: 1; padding: 15px; border-radius: 15px; border: none; background: var(--primary); color: white; font-weight: 800; cursor: pointer; }
        
        /* Form Styles (Kamar yadda suke) */
        .form-box { display: none; padding: 20px; height: 100%; justify-content: center; flex-direction: column; }
        .form-box.active { display: flex; }
        .brand-logo { width: 120px; height: 120px; margin: 0 auto 20px; border-radius: 20px; object-fit: cover; }
        input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #1f293d; background: #111827; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Slider -->
    <div id="onboardingScreen">
        <div class="slider-card">
            <img src="images/1.jpg" id="slideImg" class="slider-img">
        </div>
        <div class="status-bar"><div id="progress"></div></div>
        <div class="controls">
            <button class="btn-action" style="background:#1f293d;" onclick="skipToLogin()">SKIP</button>
            <button class="btn-action" id="nextBtn" onclick="nextSlide()">NEXT</button>
        </div>
    </div>

    <!-- Login -->
    <div id="loginScreen" class="form-box">
        <img src="images/7.jpg" class="brand-logo">
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button class="btn-action" onclick="executeLogin()">LOG IN</button>
    </div>

    <!-- Register (Kamar yadda suke) -->
    <!-- ... (Sauran code ɗin Register ɗinka) ... -->
</div>

<script>
    const images = ["images/1.jpg", "images/2.jpg", "images/3.jpg", "images/4.jpg", "images/5.jpg", "images/6.jpg"];
    let i = 0;

    function updateSlider() {
        document.getElementById('slideImg').src = images[i];
        document.getElementById('progress').style.width = ((i + 1) / images.length) * 100 + "%";
        if(i === images.length - 1) document.getElementById('nextBtn').innerText = "GET STARTED";
    }

    function nextSlide() {
        i++;
        if(i < images.length) {
            updateSlider();
        } else {
            skipToLogin();
        }
    }

    function skipToLogin() {
        document.getElementById('onboardingScreen').style.display = 'none';
        document.getElementById('loginScreen').classList.add('active');
    }
    
    // ... (Firebase logic ɗinka) ...
</script>
</body>
</html>
