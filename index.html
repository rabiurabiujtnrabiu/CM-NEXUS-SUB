<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CM Nexus Sub | Auth</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background: #0b0f19; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .box { width: 90%; max-width: 400px; background: #111827; padding: 30px; border-radius: 25px; }
        .logo { width: 100px; height: 100px; display: block; margin: 0 auto 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #1f2937; color: white; }
        button { width: 100%; padding: 12px; background: #0062ff; border: none; border-radius: 10px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<script>
    if (!localStorage.getItem('seenOnboarding')) { window.location.href = 'onboarding.html'; }
</script>

<div class="box">
    <img src="https://raw.githubusercontent.com/rabiurabiujtnrabiu/CM-NEXUS-SUB/main/7.jpg" class="logo">
    <div id="registerScreen">
        <input type="text" id="regUser" placeholder="Username">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="number" id="regPhone" placeholder="Phone">
        <input type="password" id="regPass" placeholder="Password">
        <input type="password" id="regConfirm" placeholder="Confirm Password">
        <input type="text" id="regRef" placeholder="Referral Code">
        <button onclick="initRegistration()">Register</button>
    </div>
</div>

<script>
    emailjs.init("Kdo1uh2fYzmoDsl7G");
    firebase.initializeApp({ /* Firebase Config */ });
    const db = firebase.database();
    const deviceID = localStorage.getItem('did') || 'CN-' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('did', deviceID);

    function initRegistration() {
        const u = document.getElementById('regUser').value;
        const e = document.getElementById('regEmail').value;
        const p = document.getElementById('regPass').value;
        const otp = Math.floor(100000 + Math.random() * 900000);
        
        emailjs.send("service_f6sep23", "template_otp", {to_email: e, otp_code: otp}).then(() => {
            Swal.fire({ title: 'Verify OTP', input: 'text' }).then(res => {
                if(res.value == otp) {
                    db.ref('users/' + u).set({ email: e, password: p, deviceID: deviceID }).then(() => {
                        Swal.fire('Success', 'Registered!').then(() => location.reload());
                    });
                }
            });
        });
    }
</script>
</body>
</html>
