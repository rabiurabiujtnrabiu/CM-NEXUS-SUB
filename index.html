<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CM Nexus Sub | Auth</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        body { background: #0b0f19; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .box { width: 90%; max-width: 400px; background: #111827; padding: 30px; border-radius: 25px; }
        .logo { width: 100px; height: 100px; display: block; margin: 0 auto 20px; }
        .form-box { display: none; }
        .active { display: block; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #1f2937; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0062ff; border: none; border-radius: 10px; color: white; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .switch-link { text-align: center; margin-top: 15px; cursor: pointer; color: #9ca3af; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://raw.githubusercontent.com/rabiurabiujtnrabiu/CM-NEXUS-SUB/main/7.jpg" class="logo">
    
    <div id="registerScreen" class="form-box active">
        <input type="text" id="regUser" placeholder="Username">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="number" id="regPhone" placeholder="Phone Number">
        <input type="password" id="regPass" placeholder="Password">
        <input type="password" id="regConfirm" placeholder="Confirm Password">
        <input type="text" id="regRef" placeholder="Referral Code">
        <button onclick="initRegistration()">Register</button>
        <div class="switch-link" onclick="toggleForm()">Already have an account? Login</div>
    </div>

    <div id="loginScreen" class="form-box">
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="executeLogin()">Log In</button>
        <div class="switch-link" onclick="toggleForm()">Don't have an account? Register</div>
    </div>
</div>

<script>
    emailjs.init("Kdo1uh2fYzmoDsl7G");
    
    // GINA CONFIG DAIDAI DA FIREBASE CONSOLE
    const firebaseConfig = {
        apiKey: "AIzaSyDm6DoHt0g0_B1E8FTxv8jRkbauTVu95Q0",
        authDomain: "cm-nexus-sub.firebaseapp.com",
        databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com",
        projectId: "cm-nexus-sub",
        storageBucket: "cm-nexus-sub.firebasestorage.app",
        messagingSenderId: "22010501991",
        appId: "1:22010501991:web:b9cb220657d6787d96edc2" 
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const deviceID = localStorage.getItem('did') || 'CN-' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('did', deviceID);

    function toggleForm() {
        document.getElementById('registerScreen').classList.toggle('active');
        document.getElementById('loginScreen').classList.toggle('active');
    }

    function initRegistration() {
        const u = document.getElementById('regUser').value.trim();
        const e = document.getElementById('regEmail').value.trim();
        const ph = document.getElementById('regPhone').value.trim();
        const p = document.getElementById('regPass').value.trim();
        const cp = document.getElementById('regConfirm').value.trim();
        const ref = document.getElementById('regRef').value.trim();
        
        if(!u || !e || !ph || !p || !cp) return Swal.fire('Error', 'Fill all fields', 'error');
        if(p !== cp) return Swal.fire('Error', 'Passwords do not match', 'error');

        const otp = Math.floor(100000 + Math.random() * 900000);
        Swal.fire({ title: 'Sending OTP...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        emailjs.send("service_f6sep23", "template_otp", {to_email: e, otp_code: otp}).then(() => {
            Swal.close();
            Swal.fire({ title: 'Verify OTP', input: 'text' }).then(res => {
                if(res.value == otp) {
                    db.ref('users/' + u).set({ email: e, phone: ph, password: p, referral: ref, deviceID: deviceID }).then(() => {
                        Swal.fire('Success', 'Registered!').then(() => toggleForm());
                    });
                } else {
                    Swal.fire('Error', 'Invalid OTP', 'error');
                }
            });
        });
    }

    function executeLogin() {
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value.trim();
    
    db.ref('users/' + u).once('value', snap => {
        const userData = snap.val();
        
        if(userData && userData.password === p) {
            if(userData.deviceID === deviceID) {
                // GYARA: Mun adana username a localStorage kafin mu tura shi Wallet.html
                localStorage.setItem('username', u); 
                window.location.href = "Wallet.html";
            } else {
                Swal.fire('Security', 'Account is bound to another device!', 'error');
            }
        } else {
            Swal.fire('Error', 'Invalid credentials', 'error');
        }
    });
}
</script>
</body>
</html>
