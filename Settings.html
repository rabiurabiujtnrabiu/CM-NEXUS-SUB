<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account Settings | Elite Arena Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #0062ff; 
            --accent: #00f2fe; 
            --bg: #0b0f19; /* Duhun gaba daya dandalin */
            --surface: #111827; 
            --border: #1f2937;
            --white: #111827; 
            --text-main: #f9fafb; 
            --text-dim: #9ca3af;
            --glow: rgba(0, 98, 255, 0.2); 
            --danger: #ef4444; 
            --success: #10b981;
            --dark: #0f172a;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); padding-bottom: 50px; overflow-x: hidden; }

        header { 
            padding: 20px; display: flex; align-items: center; gap: 15px; 
            background: var(--surface); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .back-btn { font-size: 20px; color: var(--text-main); cursor: pointer; transition: 0.2s; }
        .back-btn:active { transform: scale(0.85); }
        header h1 { font-size: 18px; font-weight: 800; margin: 0; color: var(--text-main); letter-spacing: -0.5px; }

        .profile-card {
            background: var(--surface); margin: 20px; padding: 25px; 
            border-radius: 28px; text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); border: 1px solid var(--border);
            animation: fadeInDown 0.5s ease;
        }
        .avatar-box {
            width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary) 0%, #00f2fe 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; color: white; font-size: 32px; font-weight: 800;
            box-shadow: 0 8px 20px var(--glow); border: 3px solid var(--border);
        }
        .profile-card h2 { margin: 0 0 5px; font-size: 18px; font-weight: 800; color: var(--text-main); }
        .profile-card p { margin: 0; font-size: 12px; font-weight: 600; color: var(--text-dim); }

        .settings-container { margin: 0 20px; }
        .settings-block {
            background: var(--surface); padding: 25px 20px; border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .block-title { font-size: 12px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }

        input {
            width: 100%; padding: 15px 18px; border-radius: 18px; border: 2px solid var(--border);
            outline: none; font-size: 14px; font-weight: 700; color: var(--text-main); background: var(--bg);
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: var(--surface); box-shadow: 0 6px 15px var(--glow); }

        .biometric-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-top: 1px solid var(--border); margin-top: 15px; }
        
        /* Modern Switch */
        .switch { position: relative; display: inline-block; width: 46px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-save { width: 100%; padding: 16px; border: none; border-radius: 18px; background: var(--primary); color: white; font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-save:active { transform: scale(0.97); }
        .btn-logout { width: 100%; padding: 16px; border: 2px solid rgba(239, 68, 68, 0.2); border-radius: 18px; background: rgba(239, 68, 68, 0.1); color: var(--danger); font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-logout:active { transform: scale(0.97); }

        .swal2-popup { border-radius: 28px !important; background: var(--surface) !important; color: white !important; }
        .swal2-title { color: white !important; font-weight: 800 !important; }
    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="location.href='Settings.html'"><i class="fas fa-arrow-left"></i></div>
        <h1>Account Settings</h1>
    </header>

    <div class="profile-card">
        <div class="avatar-box" id="avatarLetter">U</div>
        <h2 id="profileUsername">Loading...</h2>
        <p id="profileEmail">loading@user.com</p>
    </div>

    <div class="settings-container animate__animated animate__fadeInUp">
        <div class="settings-block">
            <div class="block-title"><i class="fas fa-user-cog"></i><span>Personal Information</span></div>
            <div class="form-group"><label>Full Name</label><input type="text" id="fullName" placeholder="Full name"></div>
            <div class="form-group"><label>Phone Number</label><input type="number" id="phoneNo" placeholder="Phone number"></div>
            <button class="btn-save" onclick="savePersonalDetails()">Save Profile Changes</button>
        </div>

        <div class="settings-block">
            <div class="block-title"><i class="fas fa-shield-alt"></i><span>Security & Authorization</span></div>
            <div class="form-group">
                <label>New 4-Digit PIN</label>
                <input type="number" id="securityPin" placeholder="Enter 4-Digit Security PIN" oninput="if(value.length>4) value=value.slice(0,4)">
            </div>
            <button class="btn-save" onclick="saveSecurityPin()">Update Security PIN</button>

            <div class="biometric-row">
                <div class="biometric-info">
                    <span style="font-size:13px; font-weight:700;">Fingerprint Auth</span><br>
                    <small style="font-size:10px; color:var(--text-dim);">Authorize transactions with fingerprint</small>
                </div>
                <label class="switch">
                    <input type="checkbox" id="biometricToggle" onchange="toggleBiometrics(this)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <button class="btn-logout" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i><span>Sign Out Account</span></button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CIKAKKEN CONFIGURATION NA FIREBASE DLNKA NA GASKE
        const firebaseConfig = {
            apiKey: "AIzaSyDm6DoHt0g0_B1E8FTxv8jRkbauTVu95Q0",
            authDomain: "cm-nexus-sub.firebaseapp.com",
            projectId: "cm-nexus-sub",
            databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com",
            storageBucket: "cm-nexus-sub.firebasestorage.app",
            messagingSenderId: "22010501991",
            appId: "1:22010501991:web:8f84589f0d89ab7496edc2"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myName = localStorage.getItem('username');

        // Tsaro: Idan babu login, korar user baya
        if(!myName) {
            window.location.href = "index.html";
        }

        // Realtime Listener
        db.ref('users/' + myName).on('value', snap => {
            const u = snap.val();
            if (u) {
                document.getElementById('profileUsername').innerText = "@" + myName;
                document.getElementById('profileEmail').innerText = u.email || "no-email@elite.com";
                document.getElementById('avatarLetter').innerText = myName.charAt(0).toUpperCase();
                document.getElementById('fullName').value = u.fullName || "";
                document.getElementById('phoneNo').value = u.phone || "";
                document.getElementById('securityPin').value = u.transactionPin || "";
            }
        });

        // Syncing switch state
        document.getElementById('biometricToggle').checked = localStorage.getItem('useFingerprint') === 'true';

        // BIOMETRIC SECURE CHECKING (NATIVE PROMPT FOR WEB)
        async function toggleBiometrics(chk) {
            if (chk.checked) {
                // Tabbatar ko browser tana da tsarin WebAuthn na biometric
                if (window.PublicKeyCredential) {
                    Swal.fire({
                        title: 'Tantance Yatsa (Biometrics)',
                        text: 'Tababa na\'urar scan ta wayarka yanzu don kunna fingerprint...',
                        icon: 'info',
                        showCancelButton: true,
                        confirmButtonText: 'Fara Tantancewa',
                        cancelButtonText: 'Soke shi'
                    }).then(async (res) => {
                        if (res.isConfirmed) {
                            try {
                                // Kiran asalin biometric scanner na wayar ta web API
                                const credential = await navigator.credentials.create({
                                    publicKey: {
                                        challenge: new Uint8Array([1, 2, 3, 4]),
                                        rp: { name: "CM Nexus Sub" },
                                        user: {
                                            id: new Uint8Array([1]),
                                            name: myName,
                                            displayName: myName
                                        },
                                        pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                                        authenticatorSelection: { authenticatorAttachment: "platform" }
                                    }
                                });

                                if (credential) {
                                    localStorage.setItem('useFingerprint', 'true');
                                    Swal.fire('An Kunna!', 'An yi nasarar kunna Fingerprint na asusunka.', 'success');
                                }
                            } catch (err) {
                                // Idan user ya soke ko an samu matsalar device compatibility
                                chk.checked = false;
                                localStorage.setItem('useFingerprint', 'false');
                                Swal.fire('Tantancewa Ta Fadi', 'Wayarka ba ta gama dacewa da biometric a web ba, amma zaka iya amfani da Transaction PIN dinka don tsaro.', 'warning');
                                console.error(err);
                            }
                        } else {
                            chk.checked = false;
                        }
                    });
                } else {
                    chk.checked = false;
                    localStorage.setItem('useFingerprint', 'false');
                    Swal.fire('Ba ya Aiki', 'Wannan Browser din ba ta goyi bayan Biometrics ba. Muna ba ka shawarar amfani da Transaction PIN dinka.', 'error');
                }
            } else {
                localStorage.setItem('useFingerprint', 'false');
                Swal.fire('An Kashe', 'An kashe kariya ta fingerprint otomatik.', 'info');
            }
        }

        function savePersonalDetails() {
            const name = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phoneNo').value.trim();
            if (name.length < 3) return Swal.fire('Error', 'Please enter a valid full name.', 'warning');
            if (phone.length < 10) return Swal.fire('Error', 'Please enter a valid phone number.', 'warning');
            
            Swal.fire({ title: 'Saving Profile...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            db.ref('users/' + myName).update({ fullName: name, phone: phone }).then(() => {
                Swal.fire('Success', 'Profile personal details updated live.', 'success');
            }).catch(err => {
                Swal.fire('Failed', 'Database error. Try again.', 'error');
            });
        }

        function saveSecurityPin() {
            const pin = document.getElementById('securityPin').value.trim();
            if (pin.length !== 4) return Swal.fire('Error', 'Security PIN must be exactly 4 digits.', 'warning');
            
            Swal.fire({ title: 'Updating PIN...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            db.ref('users/' + myName).update({ transactionPin: pin }).then(() => {
                Swal.fire('Success', 'Transaction Security PIN updated successfully.', 'success');
            }).catch(err => {
                Swal.fire('Failed', 'Database error. Try again.', 'error');
            });
        }

        function logoutUser() {
            Swal.fire({ 
                title: 'Sign Out Account?', 
                text: 'Are you sure you want to sign out from Elite Arena Pro?', 
                icon: 'warning', 
                showCancelButton: true, 
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#1f2937',
                confirmButtonText: 'Yes, Logout'
            }).then((r) => { 
                if (r.isConfirmed) { 
                    localStorage.clear(); 
                    window.location.href = "index.html"; 
                } 
            });
        }
    </script>
</body>
</html>
