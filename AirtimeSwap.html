<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Airtime Swap | Elite Arena Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #1A237E;
            --accent: #FFD600;
            --bg: #F4F7FE;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --success: #10b981;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); padding-bottom: 50px; overflow-x: hidden; }

        header { 
            padding: 20px; display: flex; align-items: center; gap: 15px; 
            background: var(--white); border-bottom: 1px solid rgba(0,0,0,0.02);
            position: sticky; top: 0; z-index: 1000;
        }
        .back-btn { font-size: 20px; color: var(--primary); cursor: pointer; transition: 0.2s; }
        header h1 { font-size: 18px; font-weight: 800; margin: 0; color: var(--primary); letter-spacing: -0.5px; }

        .balance-badge {
            background: var(--white); margin: 20px; padding: 18px 24px; 
            border-radius: 24px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(26, 35, 126, 0.03); border: 1px solid rgba(26, 35, 126, 0.04);
        }
        .balance-badge b { font-size: 17px; color: var(--primary); font-weight: 800; }

        .form-container { 
            background: var(--white); margin: 0 20px; padding: 30px 24px; 
            border-radius: 32px; box-shadow: 0 15px 35px rgba(0,0,0,0.02); 
        }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 12px; }

        .network-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .network-btn {
            background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 20px; padding: 14px 5px;
            display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer;
        }
        .network-logo {
            width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 800; color: white;
        }
        .logo-mtn { background: #FFEB3B; color: #000; }
        .logo-airtel { background: #FF1744; }
        .logo-glo { background: #00E676; }
        .logo-9mobile { background: #004D40; }

        .network-btn.selected { border-color: var(--primary); background: #fff; box-shadow: 0 8px 20px rgba(26,35,126,0.1); }
        .network-btn span { font-size: 10px; font-weight: 700; color: var(--text-dim); }

        .info-box {
            background: #fffbeb; border: 1px solid #fef3c7; color: #b45309;
            padding: 15px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 20px;
        }

        input { width: 100%; padding: 16px 20px; border-radius: 20px; border: 2px solid #e2e8f0; font-size: 14px; font-weight: 700; background: #f8fafc; outline: none; }
        
        .result-card {
            background: #f0fdf4; padding: 15px; border-radius: 20px; margin-top: 15px;
            display: none; justify-content: space-between; align-items: center;
        }

        .btn-purchase {
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            background: var(--primary); color: var(--white); font-weight: 800; font-size: 15px;
            box-shadow: 0 10px 25px rgba(26, 35, 126, 0.25); cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="location.href='Wallet.html'"><i class="fas fa-arrow-left"></i></div>
        <h1>Airtime Swap</h1>
    </header>

    <div class="balance-badge">
        <span>Current Wallet</span>
        <b id="walletBal">₦0.00</b>
    </div>

    <div class="form-container animate__animated animate__fadeInUp">
        <div class="info-box">
            <i class="fas fa-info-circle"></i> Convert your airtime to wallet funds. We charge <b>20%</b> service fee. (You get 80%).
        </div>

        <div class="form-group">
            <label>Select Network</label>
            <div class="network-grid">
                <div class="network-btn" id="net_mtn" onclick="selectNet('MTN', '08030000000')">
                    <div class="network-logo logo-mtn">MTN</div>
                    <span>MTN</span>
                </div>
                <div class="network-btn" id="net_airtel" onclick="selectNet('Airtel', '08020000000')">
                    <div class="network-logo logo-airtel">AIR</div>
                    <span>Airtel</span>
                </div>
                <div class="network-btn" id="net_glo" onclick="selectNet('Glo', '08050000000')">
                    <div class="network-logo logo-glo">GLO</div>
                    <span>Glo</span>
                </div>
                <div class="network-btn" id="net_9mobile" onclick="selectNet('9mobile', '08090000000')">
                    <div class="network-logo logo-9mobile">9M</div>
                    <span>9mobile</span>
                </div>
            </div>
        </div>

        <div id="adminPhoneArea" style="display:none; margin-bottom:20px;">
            <label style="font-size:11px; font-weight:800; color:var(--primary);">TRANSFER AIRTIME TO:</label>
            <div style="background:#f1f5f9; padding:15px; border-radius:15px; display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                <b id="adminPhone" style="font-size:16px; color:var(--primary);">09000000000</b>
                <i class="far fa-copy" onclick="copyAdminPhone()" style="cursor:pointer; color:var(--primary);"></i>
            </div>
        </div>

        <div class="form-group">
            <label>Airtime Amount (₦)</label>
            <input type="number" id="swapAmt" placeholder="Min ₦500" oninput="calculateSwap()">
        </div>

        <div class="result-card" id="resultCard">
            <span style="font-size:12px; font-weight:700; color:#15803d;">You will receive:</span>
            <b id="receiveAmt" style="font-size:16px; color:#15803d;">₦0.00</b>
        </div>

        <div class="form-group" style="margin-top:20px;">
            <label>Your Phone Number</label>
            <input type="number" id="userPhone" placeholder="The number you sent from">
        </div>

        <button class="btn-purchase" onclick="submitSwapRequest()">SUBMIT SWAP REQUEST</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myName = localStorage.getItem('username') || "Elite_User";

        let selectedNet = "";
        const SWAP_RATE = 0.80; // 80% user gets

        db.ref('users/' + myName + '/wallet').on('value', snap => {
            document.getElementById('walletBal').innerText = "₦" + (parseFloat(snap.val()) || 0).toLocaleString();
        });

        function selectNet(name, phone) {
            selectedNet = name;
            document.querySelectorAll('.network-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('net_' + name.toLowerCase()).classList.add('selected');
            document.getElementById('adminPhoneArea').style.display = 'block';
            document.getElementById('adminPhone').innerText = "09168696552"; // Saita lambar Admin anan
        }

        function calculateSwap() {
            const amt = parseFloat(document.getElementById('swapAmt').value);
            if (amt >= 500) {
                document.getElementById('resultCard').style.display = 'flex';
                document.getElementById('receiveAmt').innerText = "₦" + (amt * SWAP_RATE).toLocaleString();
            } else {
                document.getElementById('resultCard').style.display = 'none';
            }
        }

        function copyAdminPhone() {
            const phone = document.getElementById('adminPhone').innerText;
            navigator.clipboard.writeText(phone).then(() => {
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Number Copied!', showConfirmButton: false, timer: 1500 });
            });
        }

        function submitSwapRequest() {
            const amt = parseFloat(document.getElementById('swapAmt').value);
            const phone = document.getElementById('userPhone').value;

            if (!selectedNet || !amt || phone.length < 10) {
                return Swal.fire('Error', 'Please fill all details correctly.', 'warning');
            }

            Swal.fire({
                title: 'Confirm Transfer',
                text: `Have you successfully transferred ₦${amt} ${selectedNet} airtime to 09168696552?`,
                icon: 'question', showCancelButton: true, confirmButtonColor: '#1A237E'
            }).then(r => {
                if(r.isConfirmed) {
                    Swal.showLoading();
                    const request = {
                        username: myName,
                        network: selectedNet,
                        amountSent: amt,
                        walletToCredit: amt * SWAP_RATE,
                        userPhone: phone,
                        status: "Pending",
                        time: Date.now()
                    };
                    db.ref('airtime_swaps/').push(request).then(() => {
                        Swal.fire('Submitted!', 'Commander will verify and credit your wallet soon.', 'success');
                        document.getElementById('swapAmt').value = "";
                        document.getElementById('userPhone').value = "";
                    });
                }
            });
        }
    </script>
</body>
</html>
