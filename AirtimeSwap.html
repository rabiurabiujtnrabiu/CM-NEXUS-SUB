<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Airtime Swap | Elite Arena Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #0062ff;
            --accent: #00f2fe;
            --bg: #0b0f19; /* Canza background din ya dace da duhun dandalin duka */
            --surface: #111827;
            --border: #1f2937;
            --white: #111827;
            --text-main: #f9fafb;
            --text-dim: #9ca3af;
            --success: #10b981;
            --glow: rgba(0, 98, 255, 0.15);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); padding-bottom: 50px; overflow-x: hidden; }

        header { 
            padding: 20px; display: flex; align-items: center; gap: 15px; 
            background: var(--surface); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .back-btn { font-size: 20px; color: var(--text-main); cursor: pointer; transition: 0.2s; }
        .back-btn:active { transform: scale(0.85); }
        header h1 { font-size: 18px; font-weight: 800; margin: 0; color: var(--text-main); letter-spacing: -0.5px; }

        .balance-badge {
            background: var(--surface); margin: 20px; padding: 18px 24px; 
            border-radius: 24px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); border: 1px solid var(--border);
        }
        .balance-badge span { font-size: 11px; color: var(--text-dim); font-weight: 800; text-transform: uppercase; }
        .balance-badge b { font-size: 17px; color: var(--primary); font-weight: 800; }

        .form-container { 
            background: var(--surface); margin: 0 20px; padding: 30px 24px; 
            border-radius: 32px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border: 1px solid var(--border);
        }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }

        .network-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .network-btn {
            background: var(--bg); border: 2px solid var(--border); border-radius: 20px; padding: 14px 5px;
            display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: 0.3s;
        }
        .network-logo {
            width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 800; color: white;
        }
        .logo-mtn { background: #FFEB3B; color: #000; }
        .logo-airtel { background: #FF1744; }
        .logo-glo { background: #00E676; }
        .logo-9mobile { background: #004D40; }

        .network-btn.selected { border-color: var(--primary); background: var(--surface); box-shadow: 0 8px 20px var(--glow); }
        .network-btn span { font-size: 10px; font-weight: 700; color: var(--text-dim); }

        .info-box {
            background: rgba(245, 158, 11, 0.1); border: 1px dashed rgba(245, 158, 11, 0.3); color: #ff9800;
            padding: 15px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 25px; line-height: 1.6;
        }

        input { width: 100%; padding: 16px 20px; border-radius: 20px; border: 2px solid var(--border); font-size: 14px; font-weight: 700; color: var(--text-main); background: var(--bg); outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: var(--surface); }
        
        .result-card {
            background: rgba(16, 185, 129, 0.1); border: 1px dashed rgba(16, 185, 129, 0.3); padding: 15px; border-radius: 20px; margin-top: 15px;
            display: none; justify-content: space-between; align-items: center;
        }

        .btn-purchase {
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            background: var(--primary); color: white; font-weight: 800; font-size: 15px;
            box-shadow: 0 10px 25px rgba(0, 98, 255, 0.25); cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .btn-purchase:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="location.href='Wallet.html'"><i class="fas fa-arrow-left"></i></div>
        <h1>Airtime Swap</h1>
    </header>

    <div class="balance-badge">
        <span>Current Wallet</span>
        <b id="walletBal">₦0.00</b>
    </div>

    <div class="form-container animate__animated animate__fadeInUp">
        <div class="info-box">
            <i class="fas fa-info-circle"></i> Convert your airtime to wallet funds. We charge <b>20%</b> service fee. (You get 80%).
        </div>

        <div class="form-group">
            <label>Select Network</label>
            <div class="network-grid">
                <div class="network-btn" id="net_mtn" onclick="selectNet('MTN', '08030000000')">
                    <div class="network-logo logo-mtn">MTN</div>
                    <span>MTN</span>
                </div>
                <div class="network-btn" id="net_airtel" onclick="selectNet('Airtel', '08020000000')">
                    <div class="network-logo logo-airtel">AIR</div>
                    <span>Airtel</span>
                </div>
                <div class="network-btn" id="net_glo" onclick="selectNet('Glo', '08050000000')">
                    <div class="network-logo logo-glo">GLO</div>
                    <span>Glo</span>
                </div>
                <div class="network-btn" id="net_9mobile" onclick="selectNet('9mobile', '08090000000')">
                    <div class="network-logo logo-9mobile">9M</div>
                    <span>9mobile</span>
                </div>
            </div>
        </div>

        <div id="adminPhoneArea" style="display:none; margin-bottom:20px;">
            <label style="font-size:11px; font-weight:800; color:var(--primary);">TRANSFER AIRTIME TO:</label>
            <div style="background:var(--bg); border: 1px solid var(--border); padding:15px; border-radius:15px; display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                <b id="adminPhone" style="font-size:16px; color:var(--primary);">09168696552</b>
                <i class="far fa-copy" onclick="copyAdminPhone()" style="cursor:pointer; color:var(--primary); font-size: 18px;"></i>
            </div>
        </div>

        <div class="form-group">
            <label>Airtime Amount (₦)</label>
            <input type="number" id="swapAmt" placeholder="Min ₦500" oninput="calculateSwap()">
        </div>

        <div class="result-card" id="resultCard">
            <span style="font-size:12px; font-weight:700; color:var(--success);">You will receive:</span>
            <b id="receiveAmt" style="font-size:16px; color:var(--success);">₦0.00</b>
        </div>

        <div class="form-group" style="margin-top:20px;">
            <label>Your Phone Number</label>
            <input type="number" id="userPhone" placeholder="The number you sent from">
        </div>

        <button class="btn-purchase" onclick="submitSwapRequest()">SUBMIT SWAP REQUEST</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CIKAKKEN CONFIGURATION NA FIREBASE DLNKA NA GASKE
        const firebaseConfig = {
            apiKey: "AIzaSyDm6DoHt0g0_B1E8FTxv8jRkbauTVu95Q0",
            authDomain: "cm-nexus-sub.firebaseapp.com",
            projectId: "cm-nexus-sub",
            databaseURL: "https://cm-nexus-sub-default-rtdb.firebaseio.com",
            storageBucket: "cm-nexus-sub.firebasestorage.app",
            messagingSenderId: "22010501991",
            appId: "1:22010501991:web:8f84589f0d89ab7496edc2"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myName = localStorage.getItem('username');

        // Tsaro: Idan babu login, korar user baya
        if(!myName) {
            window.location.href = "index.html";
        }

        let selectedNet = "";
        const SWAP_RATE = 0.80; // 80% user gets

        // SYNC BALANCE LIVE
        db.ref('users/' + myName + '/wallet').on('value', snap => {
            document.getElementById('walletBal').innerText = "₦" + (parseFloat(snap.val()) || 0).toLocaleString('en-US', { minimumFractionDigits: 2 });
        });

        function selectNet(name, phone) {
            selectedNet = name;
            document.querySelectorAll('.network-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('net_' + name.toLowerCase()).classList.add('selected');
            document.getElementById('adminPhoneArea').style.display = 'block';
            document.getElementById('adminPhone').innerText = "09168696552"; // Lambar Admin dinka
        }

        function calculateSwap() {
            const amt = parseFloat(document.getElementById('swapAmt').value);
            if (amt >= 500) {
                document.getElementById('resultCard').style.display = 'flex';
                document.getElementById('receiveAmt').innerText = "₦" + (amt * SWAP_RATE).toLocaleString('en-US', { minimumFractionDigits: 2 });
            } else {
                document.getElementById('resultCard').style.display = 'none';
            }
        }

        function copyAdminPhone() {
            const phone = document.getElementById('adminPhone').innerText;
            navigator.clipboard.writeText(phone).then(() => {
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Number Copied!', showConfirmButton: false, timer: 1500 });
            });
        }

        function submitSwapRequest() {
            const amt = parseFloat(document.getElementById('swapAmt').value);
            const phone = document.getElementById('userPhone').value.trim();

            if (!selectedNet) {
                return Swal.fire('Required', 'Please select a network cibiyar sadarwa.', 'warning');
            }
            if (isNaN(amt) || amt < 500) {
                return Swal.fire('Required', 'Minimum swap amount is ₦500.', 'warning');
            }
            if (phone.length < 10) {
                return Swal.fire('Required', 'Please enter a valid phone number you sent from.', 'warning');
            }

            Swal.fire({
                title: 'Confirm Swap Request',
                html: `Have you successfully transferred <b>₦${amt}</b> worth of <b>${selectedNet}</b> airtime to <b>09168696552</b>?`,
                icon: 'question', 
                showCancelButton: true, 
                confirmButtonColor: '#0062ff',
                cancelButtonColor: '#1f2937'
            }).then(r => {
                if(r.isConfirmed) {
                    Swal.fire({ title: 'Submitting Request...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    
                    const request = {
                        username: myName,
                        network: selectedNet,
                        amountSent: amt,
                        walletToCredit: amt * SWAP_RATE,
                        userPhone: phone,
                        status: "Pending",
                        time: Date.now()
                    };

                    db.ref('airtime_swaps/').push(request).then(() => {
                        Swal.fire('Submitted Successful!', 'Your swap request has been received. Commander will verify and credit your wallet soon.', 'success');
                        document.getElementById('swapAmt').value = "";
                        document.getElementById('userPhone').value = "";
                        document.getElementById('resultCard').style.display = 'none';
                    }).catch(err => {
                        Swal.fire('Failed', 'Database write error. Try again.', 'error');
                    });
                }
            });
        }
    </script>
</body>
</html>
